<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFantasy Live</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="theme-color" content="#c3dfe0">
    <meta name="msapplication-TileColor" content="#c3dfe0">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class', // 允许通过给 <html> 标签添加 'dark' 类来切换模式
        theme: {
            extend: {
                colors: {
                    nf: {
                        blue:  '#c3dfe0', // Light Blue
                        green: '#bcd979', // Willow Green
                        olive: '#9dad6f', // Muted Olive
                        grey:  '#7d6d61', // Dim Grey
                        brown: '#5e574d', // Stone Brown
                        mist:  '#eef5f5', // 浅色页面背景（Light Blue 衍生）
                        frost: '#ddecec', // 浅色次级表面
                        leaf:  '#a9c961', // Willow Green 加深（hover）
                        sand:  '#b5aa9e', // Dim Grey 提亮（暗色弱文本）
                        bark:  '#4c463f', // 暗色卡片表面（Stone Brown 衍生）
                        coal:  '#38342e', // 暗色页面背景 / 浅色主文本
                        cream: '#f2efe8', // 暗色模式主文本
                    }
                }
            }
        }
    }
    </script>
    
    <!-- ArtPlayer CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* 增加平滑过渡效果 */
        html, body { transition: background-color 0.3s, color 0.3s; }        
        .show-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .show-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 播放器容器 16:9 比例 */
        #player-container {
            display: none;
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例 */
        }
        
        #player-container > div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        
        /* 移动端模态框优化 */
        @media (max-width: 768px) {
            .modal-overlay {
                align-items: flex-start;
                padding-top: 5vh;
            }
        }
        
        /* 汉堡菜单动画 */
        .mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .mobile-menu.active {
            max-height: 500px;
        }
        
        /* 确保按钮有足够的点击热区 */
        button, .watch-btn {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* 图片容器固定比例，防止布局跳动 */
        .show-card-image {
            aspect-ratio: 4/3;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-white min-h-screen">
    
    <!-- Header -->
    <header class="bg-white shadow-lg dark:bg-gray-800 sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 md:py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <div class="flex items-center space-x-2 md:space-x-4">
                    <h1 class="text-lg md:text-2xl font-bold text-purple-600 dark:text-purple-400">NeoFantasy Live</h1>
                    <span class="hidden sm:inline text-xs md:text-sm text-gray-500 dark:text-gray-400">live.neofantasy.online</span>
                </div>
                
                <!-- 桌面端按钮组 -->
                <div class="hidden md:flex items-center space-x-4">
                    <button onclick="toggleTheme()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition" aria-label="切换主题" title="切换亮色/暗色主题">
                        <span id="theme-icon">🌙</span>
                    </button>
                    
                    <div id="user-status" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg">
                        <span class="text-sm">身份: </span>
                        <span id="user-role" class="font-semibold text-yellow-600 dark:text-yellow-400">未登录</span>
                    </div>
                    
                    <div id="auth-buttons" class="flex space-x-2">
                        <button onclick="showLoginModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition">
                            登录
                        </button>
                        <button onclick="showRegisterModal()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition">
                            注册
                        </button>
                    </div>
                    
                    <div id="user-menu" class="hidden">
                        <button onclick="toggleUserDashboard()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition">
                            我的订阅
                        </button>
                        <button onclick="logout()" class="px-4 py-2 ml-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
                            登出
                        </button>
                    </div>
                    <a id="admin-link" href="/admin/" class="hidden px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg transition">
                        管理控制台
                    </a>
                </div>
                
                <!-- 移动端按钮组 -->
                <div class="flex md:hidden items-center space-x-2">
                    <button onclick="toggleTheme()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition" aria-label="切换主题" title="切换亮色/暗色主题">
                        <span id="theme-icon-mobile">🌙</span>
                    </button>
                    <button onclick="toggleMobileMenu()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition" aria-label="打开菜单" title="打开导航菜单">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 移动端下拉菜单 -->
            <div id="mobile-menu" class="mobile-menu md:hidden">
                <div class="pt-4 pb-2 space-y-2">
                    <div class="px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg text-center">
                        <span class="text-sm">身份: </span>
                        <span id="user-role-mobile" class="font-semibold text-yellow-600 dark:text-yellow-400">未登录</span>
                    </div>
                    
                    <div id="auth-buttons-mobile" class="space-y-2">
                        <button onclick="showLoginModal(); toggleMobileMenu();" class="w-full px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition">
                            登录
                        </button>
                        <button onclick="showRegisterModal(); toggleMobileMenu();" class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg transition">
                            注册
                        </button>
                    </div>
                    
                    <div id="user-menu-mobile" class="hidden space-y-2">
                        <button onclick="toggleUserDashboard(); toggleMobileMenu();" class="w-full px-4 py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition">
                            我的订阅
                        </button>
                        <button onclick="logout(); toggleMobileMenu();" class="w-full px-4 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">
                            登出
                        </button>
                        <a id="admin-link-mobile" href="/admin/" class="hidden block w-full px-4 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-lg transition text-center">
                            管理控制台
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container mx-auto px-3 sm:px-4 md:px-6 py-6 md:py-8">
        
        <!-- Player Section (Hidden by default) -->
        <div id="player-section" class="mb-6 md:mb-8 hidden">
            <div class="bg-white dark:bg-gray-800 rounded-lg p-3 md:p-4 shadow-xl">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 md:mb-4 gap-2">
                    <h2 id="now-playing-title" class="text-base md:text-xl font-bold break-words max-w-full">正在播放...</h2>
                    <button onclick="closePlayer()" class="w-full sm:w-auto px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition whitespace-nowrap">
                        关闭播放器
                    </button>
                </div>
                <div id="player-container" class="w-full"></div>
            </div>
        </div>

        <!-- Shows Grid -->
        <div id="shows-section">
            <h2 class="text-xl md:text-2xl font-bold mb-4 md:mb-6">🎬 播放列表</h2>
            <div id="shows-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                <!-- Shows will be dynamically loaded here -->
            </div>
        </div>

        <!-- User Dashboard (Hidden by default) -->
        <div id="user-dashboard" class="mt-6 md:mt-8 hidden">
            <div class="bg-white dark:bg-gray-800 rounded-lg p-4 md:p-6 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl md:text-2xl font-bold">📦 我的订阅</h2>
                    <button onclick="toggleUserDashboard()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white p-2" aria-label="关闭我的订阅" title="关闭我的订阅面板">
                        ✕ 关闭
                    </button>
                </div>
                <div id="purchased-shows" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Purchased shows will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 md:p-8 max-w-md w-full mx-4">
            <h3 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-center">🔐 用户登录</h3>
            
            <form id="login-form" onsubmit="event.preventDefault(); login();">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">邮箱</label>
                        <input type="email" id="login-email" required autocomplete="email"
                               class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">密码</label>
                        <input type="password" id="login-password" required
                               class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                    </div>
                    
                    <div id="login-error" class="text-red-500 text-sm hidden"></div>
                    
                    <div class="space-y-3">
                        <button type="submit" 
                                class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition">
                            登录
                        </button>
                        <button type="button" onclick="hideLoginModal()"
                                class="w-full px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">
                            取消
                        </button>
                        <div class="text-center text-sm text-gray-500">
                            还没有账号？ <a href="javascript:void(0)" onclick="switchToRegister()" class="text-blue-500 hover:underline">立即注册</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay">
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 md:p-8 max-w-md w-full mx-4">
            <h3 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-center">📝 用户注册</h3>
            
            <form id="register-form" onsubmit="event.preventDefault(); register();">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">邮箱</label>
                        <input type="email" id="register-email" required autocomplete="email"
                               class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">密码</label>
                        <input type="password" id="register-password" required
                               class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">确认密码</label>
                        <input type="password" id="register-confirm-password" required
                               class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">邮箱验证码</label>
                        <div class="flex gap-2">
                            <input type="text" id="register-code" inputmode="numeric" maxlength="6" required
                                   class="min-w-0 flex-1 px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-base">
                            <button type="button" id="send-register-code" onclick="sendRegisterCode()"
                                    class="shrink-0 px-3 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded-lg transition">
                                发送验证码
                            </button>
                        </div>
                    </div>
                    
                    <div id="register-error" class="text-red-500 text-sm hidden"></div>
                    <div id="register-success" class="text-green-500 text-sm hidden"></div>
                    
                    <div class="space-y-3">
                        <button type="submit" 
                                class="w-full px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold transition">
                            注册
                        </button>
                        <button type="button" onclick="hideRegisterModal()"
                                class="w-full px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">
                            取消
                        </button>
                        <div class="text-center text-sm text-gray-500">
                            已有账号？ <a href="javascript:void(0)" onclick="switchToLogin()" class="text-blue-500 hover:underline">立即登录</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'https://api.neofantasy.online';
        const AUTH_BASE_URL = 'https://auth.neofantasy.online';
        const TOKEN_KEY = 'nf_access_token';
        const USER_KEY = 'nf_user';
        const PURCHASED_SHOWS_KEY = 'purchased_shows';
        
        // Global variables
        let artPlayer = null;
        let currentShowId = null;
        let purchasedShows = [];
        let currentUser = null;
        
        // shows data - 将从 API 动态加载
        let Shows = [];

        // --- 主题切换逻辑 ---
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').textContent = '☀️';
                const mobileIcon = document.getElementById('theme-icon-mobile');
                if (mobileIcon) mobileIcon.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').textContent = '🌙';
                const mobileIcon = document.getElementById('theme-icon-mobile');
                if (mobileIcon) mobileIcon.textContent = '🌙';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            const icon = isDark ? '☀️' : '🌙';
            document.getElementById('theme-icon').textContent = icon;
            const mobileIcon = document.getElementById('theme-icon-mobile');
            if (mobileIcon) mobileIcon.textContent = icon;
        }
        
        // 切换移动端菜单
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
        }

        // Load site page views via Supabase backend
        async function loadSitePV() {
            const pvEl = document.getElementById('busuanzi_value_site_pv');
            if (!pvEl) return;

            pvEl.textContent = '-';
            try {
                const res = await fetch('https://api.neofantasy.online/api/stats/hit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (typeof data.count === 'number') {
                    pvEl.textContent = data.count.toLocaleString();
                    return;
                }
            } catch (err) {
                console.error('Site PV load failed:', err);
            }
            pvEl.textContent = '当前不可访问';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme(); // 初始化主题
            await restoreSession();
            updateAuthUI(); // 初始化认证状态显示
            loadShows(); // 动态加载节目列表
            loadBuildInfo(); // 加载构建信息
            loadSitePV(); // 加载站点访问量
        });

        function currentToken() {
            return localStorage.getItem(TOKEN_KEY) || '';
        }

        async function restoreSession() {
            const token = currentToken();
            try {
                const response = await fetch(`${AUTH_BASE_URL}/api/session/me`, {
                    credentials: 'include',
                    headers: token ? { Authorization: `Bearer ${token}` } : {},
                });
                if (!response.ok) throw new Error('session expired');
                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            } catch (_) {
                currentUser = null;
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USER_KEY);
            }
        }

        async function authFetch(path, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const token = currentToken();
            if (token) headers.Authorization = `Bearer ${token}`;
            return fetch(`${AUTH_BASE_URL}${path}`, {
                ...options,
                headers,
                credentials: 'include',
            });
        }

        async function apiFetch(path, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const token = currentToken();
            if (token) headers.Authorization = `Bearer ${token}`;
            return fetch(`${API_BASE_URL}${path}`, {
                ...options,
                headers,
                credentials: 'include',
            });
        }

        // 更新认证 UI：身份来自 auth 签发的会话，不再读取 URL 中的用户名。
        function updateAuthUI() {
            const username = currentUser?.email || '';
            const isAdmin = currentUser?.role === 'admin';

            if (currentUser) {
                // 用户已登录：隐藏登录/注册按钮，显示用户菜单
                // 桌面端
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('user-role').textContent = username;
                document.getElementById('user-role').classList.remove('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('user-role').classList.add('text-purple-600', 'dark:text-purple-400');
                
                // 移动端
                document.getElementById('auth-buttons-mobile').classList.add('hidden');
                document.getElementById('user-menu-mobile').classList.remove('hidden');
                document.getElementById('user-role-mobile').textContent = username;
                document.getElementById('user-role-mobile').classList.remove('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('user-role-mobile').classList.add('text-purple-600', 'dark:text-purple-400');
                document.getElementById('admin-link').classList.toggle('hidden', !isAdmin);
                document.getElementById('admin-link-mobile').classList.toggle('hidden', !isAdmin);
                updatePurchasedShows();
            } else {
                // 用户未登录：显示登录/注册按钮，隐藏用户菜单
                // 桌面端
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('user-role').textContent = '未登录';
                document.getElementById('user-role').classList.remove('text-purple-600', 'dark:text-purple-400');
                document.getElementById('user-role').classList.add('text-yellow-600', 'dark:text-yellow-400');
                
                // 移动端
                document.getElementById('auth-buttons-mobile').classList.remove('hidden');
                document.getElementById('user-menu-mobile').classList.add('hidden');
                document.getElementById('user-role-mobile').textContent = '未登录';
                document.getElementById('user-role-mobile').classList.remove('text-purple-600', 'dark:text-purple-400');
                document.getElementById('user-role-mobile').classList.add('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('admin-link').classList.add('hidden');
                document.getElementById('admin-link-mobile').classList.add('hidden');
            }
        }

        // Load shows into grid - 从 API 动态加载
        async function loadShows() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/shows`);
                if (!response.ok) {
                    throw new Error('获取节目列表失败');
                }
                const data = await response.json();
                Shows = data.shows || [];
                
                const grid = document.getElementById('shows-grid');
                grid.innerHTML = '';
                
                Shows.forEach(show => {
                    grid.appendChild(createShowCard(show));
                });
            } catch (error) {
                console.error('加载节目列表错误:', error);
                const grid = document.getElementById('shows-grid');
                grid.innerHTML = '<div class="col-span-full text-center text-red-500 p-8">加载节目列表失败，请稍后重试</div>';
            }
        }

        // Create show card element - 修复事件冒泡问题
        function createShowCard(show) {
            const card = document.createElement('div');
            card.className = 'show-card bg-white dark:bg-gray-800 rounded-lg overflow-hidden relative shadow-md cursor-pointer';
            
            const imagePath = `/image/${show.title}.jpg`; // 使用 .jpg 格式
            const isLive = show.is_live || false; // 数据库字段：蛇形命名
            const requiresAuth = show.requires_auth !== undefined ? show.requires_auth : true; // 数据库字段：蛇形命名
            
            card.innerHTML = `
                <div class="relative show-card-image">
                    <img src="${imagePath}" alt="${show.title}" class="w-full h-full object-cover" loading="lazy">
                    ${isLive ? '<span class="badge bg-red-600 text-white animate-pulse">● 直播中</span>' : '<span class="badge bg-gray-500 text-white">待开播</span>'}
                </div>
                <div class="p-3 md:p-4">
                    <h3 class="text-base md:text-lg font-bold mb-2 line-clamp-2">${show.title}</h3>
                    <p class="text-gray-500 dark:text-gray-400 text-xs md:text-sm mb-3 whitespace-pre-line">${show.description || ''}</p>
                    <div class="flex justify-between items-center gap-2">
                        <span class="text-xs md:text-sm ${requiresAuth ? 'text-yellow-600 dark:text-yellow-400' : 'text-green-600 dark:text-green-400'}">
                            ${requiresAuth ? '🔒 带锁转播' : '🆓 开锁转播'}
                        </span>
                        <div class="flex gap-2">
                            <button class="watch-btn px-3 md:px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded text-white transition text-sm whitespace-nowrap" data-show-id="${show.id}">
                                观看
                            </button>
                            ${requiresAuth ? `<button class="request-btn px-3 py-2 bg-gray-600 hover:bg-gray-500 rounded text-white transition text-sm whitespace-nowrap" data-show-id="${show.id}">申请</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            // 为观看按钮单独添加事件监听器
            const watchBtn = card.querySelector('.watch-btn');
            watchBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡
                handleShowClick(this.getAttribute('data-show-id'));
            });
            const requestBtn = card.querySelector('.request-btn');
            if (requestBtn) {
                requestBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    requestPermission(this.getAttribute('data-show-id'));
                });
            }
            
            // 卡片其他区域点击也触发观看
            card.addEventListener('click', function(e) {
                // 如果点击的不是按钮，则触发观看
                if (!e.target.closest('.watch-btn')) {
                    handleShowClick(show.id);
                }
            });
            
            return card;
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (!artPlayer) return; // 只在播放器存在时响应快捷键
            
            if (e.code === 'Space') {
                e.preventDefault();
                artPlayer.toggle();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                artPlayer.currentTime = Math.max(0, artPlayer.currentTime - 5);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                artPlayer.currentTime = artPlayer.currentTime + 5;
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                artPlayer.volume = Math.min(1, artPlayer.volume + 0.1);
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                artPlayer.volume = Math.max(0, artPlayer.volume - 0.1);
            } else if (e.code === 'KeyF' || e.code === 'Enter') {
                e.preventDefault();
                artPlayer.fullscreen = !artPlayer.fullscreen;
            }
        });

        // Handle show click - 根据 requires_auth 决定是否需要登录
        function handleShowClick(showId) {
            const show = Shows.find(s => s.id === showId);
            if (!show) {
                alert('节目不存在');
                return;
            }

            currentShowId = showId;
            const requiresAuth = show.requires_auth !== undefined ? show.requires_auth : true;
            
            // 如果节目不需要鉴权，直接允许观看
            if (!requiresAuth) {
                // 在新标签页打开播放器，无需 token
                const playerUrl = `player.html?show_id=${encodeURIComponent(showId)}`;
                window.open(playerUrl, '_blank');
                return;
            }
            
            // 需要鉴权的节目，检查是否登录
            if (!currentUser) {
                showLoginModal();
                return;
            }
            
            // 已登录，在新标签页打开播放器
            const playerUrl = `player.html?show_id=${encodeURIComponent(showId)}`;
            window.open(playerUrl, '_blank');
        }

        async function requestPermission(showId) {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            const reason = prompt('请填写申请原因（可选）', '申请观看该节目');
            if (reason === null) return;
            try {
                const response = await apiFetch('/api/permission-requests', {
                    method: 'POST',
                    body: JSON.stringify({ show_id: showId, reason }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || '申请失败');
                alert('申请已提交，请等待管理员审核。');
            } catch (error) {
                alert(error.message || '申请失败');
            }
        }

        // Play stream with ArtPlayer
        function playStream(url, showId) {
            document.getElementById('player-section').classList.remove('hidden');
            const show = Shows.find(s => s.id === showId);
            const showTitle = show ? show.title : '节目';
            document.getElementById('now-playing-title').textContent = `正在播放: ${showTitle}`;
            document.getElementById('player-container').style.display = 'block';
            
            // Scroll to player
            document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
            
            // Destroy existing player if any
            if (artPlayer) {
                artPlayer.destroy();
            }
            
            // Initialize ArtPlayer
            artPlayer = new Artplayer({
                container: '#player-container',
                url: url,
                type: 'm3u8',
                customType: {
                    m3u8: function(video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    }
                },
                autoplay: true,
                autoSize: true,
                autoMini: true,
                loop: false,
                flip: true,
                playbackRate: true,
                aspectRatio: true,
                setting: true,
                hotkey: true,
                pip: true,
                mutex: true,
                fullscreen: true,
                fullscreenWeb: true,
                subtitle: {
                    url: '',
                },
                moreVideoAttr: {
                    preload: 'auto',
                },
            });

            artPlayer.on('ready', () => {
                console.log('Player is ready');
            });
            
            artPlayer.on('error', (err) => {
                console.error('Player error:', err);
                alert('播放器错误: ' + err.message);
            });
        }

        // Close player
        function closePlayer() {
            if (artPlayer) {
                artPlayer.destroy();
                artPlayer = null;
            }
            document.getElementById('player-section').classList.add('hidden');
            document.getElementById('player-container').style.display = 'none';
        }

        // 登录和注册全部交给 auth 服务；本页只保存短期访问令牌作为 Cookie 失效时的回退。
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const loginError = document.getElementById('login-error');
            
            if (!email || !password) {
                loginError.textContent = '请填写完整信息';
                loginError.classList.remove('hidden');
                return;
            }

            try {
                const response = await authFetch('/api/session/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem(TOKEN_KEY, data.access_token || '');
                    currentUser = data.user;
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    hideLoginModal();
                    updateAuthUI();
                    alert('登录成功！');
                } else {
                    loginError.textContent = data.error || '登录失败';
                    loginError.classList.remove('hidden');
                }
            } catch (e) {
                loginError.textContent = '无法连接到验证服务器';
                loginError.classList.remove('hidden');
            }
        }

        async function sendRegisterCode() {
            const email = document.getElementById('register-email').value.trim();
            const errorElement = document.getElementById('register-error');
            if (!email) {
                errorElement.textContent = '请先填写邮箱';
                errorElement.classList.remove('hidden');
                return;
            }
            try {
                const response = await authFetch('/api/session/verify-code', {
                    method: 'POST',
                    body: JSON.stringify({ email }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.error || '验证码发送失败');
                alert(`验证码已发送，有效期 ${data.timeout} 秒`);
            } catch (error) {
                errorElement.textContent = error.message || '验证码发送失败';
                errorElement.classList.remove('hidden');
            }
        }

        async function register() {
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const code = document.getElementById('register-code').value.trim();
            const errorElement = document.getElementById('register-error');
            const successElement = document.getElementById('register-success');
            
            errorElement.classList.add('hidden');
            successElement.classList.add('hidden');
            
            // Validation
            if (!email || !password || !code) {
                errorElement.textContent = '邮箱、密码和验证码不能为空';
                errorElement.classList.remove('hidden');
                return;
            }
            
            if (password !== confirmPassword) {
                errorElement.textContent = '两次输入的密码不一致';
                errorElement.classList.remove('hidden');
                return;
            }
            
            if (password.length < 8) {
                errorElement.textContent = '密码长度至少8位';
                errorElement.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await authFetch('/api/session/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, code })
                });
                
                console.log('Register response status:', response.status);
                const data = await response.json();
                console.log('Register response data:', data);
                
                if (response.ok) {
                    successElement.textContent = '注册成功，已自动登录';
                    successElement.classList.remove('hidden');
                    localStorage.setItem(TOKEN_KEY, data.access_token || '');
                    currentUser = data.user;
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    updateAuthUI();
                    setTimeout(hideRegisterModal, 500);
                } else {
                    errorElement.textContent = data.error || '注册失败';
                    errorElement.classList.remove('hidden');
                }
            } catch (e) {
                console.error('Register error:', e);
                errorElement.textContent = '网络错误，请检查连接';
                errorElement.classList.remove('hidden');
            }
        }

        // Logout function
        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                try { await authFetch('/api/session/logout', { method: 'POST' }); } catch (_) {}
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USER_KEY);
                localStorage.removeItem(PURCHASED_SHOWS_KEY);
                currentUser = null;
                
                // 关闭播放器
                closePlayer();
                
                // 更新UI显示为未登录状态
                updateAuthUI();
                
                // 更新用户仪表板
                updateUserDashboard();
                
                // 提示用户
                alert('已退出登录');
            }
        }

        function updatePurchasedShows() {
            const stored = localStorage.getItem(PURCHASED_SHOWS_KEY);
            try { purchasedShows = stored ? JSON.parse(stored) : []; } catch (_) { purchasedShows = []; }
        }

        // Get purchased shows
        function getPurchasedShows() {
            return purchasedShows;
        }

        // Modal functions
        function showLoginModal() {
            document.getElementById('login-modal').classList.add('active');
        }
        
        function hideLoginModal() {
            document.getElementById('login-modal').classList.remove('active');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
        }
        
        function showRegisterModal() {
            document.getElementById('register-modal').classList.add('active');
        }
        
        function hideRegisterModal() {
            document.getElementById('register-modal').classList.remove('active');
            document.getElementById('register-error').classList.add('hidden');
            document.getElementById('register-success').classList.add('hidden');
            document.getElementById('register-email').value = '';
            document.getElementById('register-password').value = '';
            document.getElementById('register-confirm-password').value = '';
            document.getElementById('register-code').value = '';
        }
        
        function switchToRegister() {
            hideLoginModal();
            showRegisterModal();
        }
        
        function switchToLogin() {
            hideRegisterModal();
            showLoginModal();
        }

        // Toggle user dashboard
        function toggleUserDashboard() {
            const dashboard = document.getElementById('user-dashboard');
            dashboard.classList.toggle('hidden');
            if (!dashboard.classList.contains('hidden')) {
                updateUserDashboard();
                dashboard.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Load build info from GitHub API
        async function loadBuildInfo() {
            const owner = 'yuuuiv';
            const repo = 'LIVE_Streaming';
            
            try {
                // 获取最新的提交信息
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=1`, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch commit info');
                }
                
                const data = await response.json();
                if (data.length > 0) {
                    const commit = data[0];
                    const commitHash = commit.sha.substring(0, 7);
                    const commitDate = new Date(commit.commit.author.date);
                    const formattedDate = commitDate.toLocaleDateString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    // 更新提交哈希
                    document.getElementById('commit-hash').textContent = commitHash;
                    document.getElementById('commit-link').href = `https://github.com/${owner}/${repo}/commit/${commit.sha}`;
                    
                    // 更新构建时间
                    document.getElementById('build-date').textContent = `Updated: ${formattedDate}`;
                    
                    // 添加提示文本
                    document.getElementById('build-info').title = `点击查看完整提交信息\n${commit.commit.message.split('\n')[0]}`;
                }
            } catch (error) {
                console.error('Error loading build info:', error);
                // 失败时显示默认值
                document.getElementById('commit-hash').textContent = 'Unknown';
                document.getElementById('build-date').textContent = 'Updated: -';
            }
        }

        // Update user dashboard - 实时获取用户订阅，不依赖缓存
        async function updateUserDashboard() {
            const container = document.getElementById('purchased-shows');
            if (!currentUser) {
                container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-full text-center py-8">请登录后查看订阅</p>';
                return;
            }
            
            // 显示加载状态
            container.innerHTML = '<p class="text-gray-400 dark:text-gray-500 col-span-full text-center py-8">正在同步订阅信息...</p>';
            
            try {
                // 从后端实时获取用户的已购节目列表
                const response = await apiFetch('/api/user-purchases');
                
                if (!response.ok) {
                    container.innerHTML = '<p class="text-red-500 dark:text-red-400 col-span-full text-center py-8">获取订阅失败，请稍后重试</p>';
                    return;
                }
                
                const data = await response.json();
                const purchasedShows = data.purchased_shows || [];
                
                // 仅作界面缓存，权限判断始终由后端完成。
                localStorage.setItem(PURCHASED_SHOWS_KEY, JSON.stringify(purchasedShows));
                
                // 清空容器
                container.innerHTML = '';
                
                // 如果没有购买任何节目
                if (purchasedShows.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-full text-center py-8">您还没有购买任何节目</p>';
                    return;
                }
                
                // 遍历所有节目，如果已购买则显示
                Shows.forEach(show => {
                    if (purchasedShows.includes(show.id)) {
                        const card = document.createElement('div');
                        
                        card.className = 'bg-gray-100 dark:bg-gray-700 rounded-lg p-4 cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-600 transition shadow-sm';
                        card.onclick = () => {
                            toggleUserDashboard();
                            handleShowClick(show.id);
                        };
                        
                        card.innerHTML = `
                            <h4 class="font-bold mb-2">${show.title}</h4>
                            <p class="text-sm text-gray-500 dark:text-gray-300 mb-2">${show.description}</p>
                            <span class="text-xs text-green-600 dark:text-green-400 font-medium">✓ 已购买</span>
                        `;
                        container.appendChild(card);
                    }
                });
                
            } catch (err) {
                console.error('获取订阅失败:', err);
                container.innerHTML = '<p class="text-red-500 dark:text-red-400 col-span-full text-center py-8">获取订阅失败，请稍后重试</p>';
            }
        }
        
        // Close modals when clicking outside
        document.addEventListener('click', (e) => {
            const loginModal = document.getElementById('login-modal');
            const registerModal = document.getElementById('register-modal');
            
            if (loginModal.classList.contains('active') && e.target === loginModal) {
                hideLoginModal();
            }
            
            if (registerModal.classList.contains('active') && e.target === registerModal) {
                hideRegisterModal();
            }
        });
    </script>
