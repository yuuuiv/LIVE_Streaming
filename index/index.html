<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFantasy Live</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="theme-color" content="#c3dfe0">
    <meta name="msapplication-TileColor" content="#c3dfe0">
    <script src="/assets/neofantasy-theme.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class', // 允许通过给 <html> 标签添加 'dark' 类来切换模式
        theme: {
            extend: {
                colors: {
                    nf: {
                        blue:  '#c3dfe0', // Light Blue
                        green: '#bcd979', // Willow Green
                        olive: '#9dad6f', // Muted Olive
                        grey:  '#7d6d61', // Dim Grey
                        brown: '#5e574d', // Stone Brown
                        mist:  '#eef5f5', // 浅色页面背景（Light Blue 衍生）
                        frost: '#ddecec', // 浅色次级表面
                        leaf:  '#a9c961', // Willow Green 加深（hover）
                        sand:  '#b5aa9e', // Dim Grey 提亮（暗色弱文本）
                        bark:  '#4c463f', // 暗色卡片表面（Stone Brown 衍生）
                        coal:  '#38342e', // 暗色页面背景 / 浅色主文本
                        cream: '#f2efe8', // 暗色模式主文本
                    }
                }
            }
        }
    }
    </script>
    
    <!-- ArtPlayer CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* 增加平滑过渡效果 */
        html, body { transition: background-color 0.3s, color 0.3s; }        
        .show-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .show-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        .badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* 播放器容器 16:9 比例 */
        #player-container {
            display: none;
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例 */
        }
        
        #player-container > div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.75);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        
        /* 移动端模态框优化 */
        @media (max-width: 768px) {
            .modal-overlay {
                align-items: flex-start;
                padding-top: 5vh;
            }
        }
        
        /* 汉堡菜单动画 */
        .mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .mobile-menu.active {
            max-height: 500px;
        }
        
        /* 确保按钮有足够的点击热区 */
        button, .watch-btn {
            min-height: 44px;
            min-width: 44px;
        }
        
        /* 图片容器固定比例，防止布局跳动 */
        .show-card-image {
            aspect-ratio: 4/3;
        }
    </style>
    <link rel="stylesheet" href="/assets/neofantasy-theme.css">
</head>
<body class="nf-site min-h-screen">
    <a class="skip-link" href="#main-content">跳到主要内容</a>
    
    <!-- Header -->
    <header class="site-header sticky top-0 z-40">
        <div class="container mx-auto px-4 py-3 md:py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <a href="/index/" class="brand-lockup" aria-label="NeoFantasy Live 首页">
                    <img src="/favicon/favicon.svg" alt="" class="brand-logo" width="42" height="42">
                    <span class="brand-copy"><strong>NeoFantasy</strong><small>LIVE</small></span>
                </a>
                
                <!-- 桌面端按钮组 -->
                <div class="hidden md:flex items-center space-x-4">
                    <button type="button" class="nf-theme-toggle" data-theme-toggle aria-label="切换主题">
                        <span data-theme-icon="moon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg></span>
                    </button>
                    
                    <div id="user-status" class="nf-user-status px-4 py-2">
                        <span class="text-sm">身份: </span>
                        <span id="user-role" class="font-semibold text-yellow-600 dark:text-yellow-400">未登录</span>
                    </div>
                    
                    <div id="auth-buttons" class="flex space-x-2">
                        <button type="button" onclick="showLoginModal()" class="nf-button nf-button-secondary px-4 py-2">
                            登录
                        </button>
                        <button type="button" onclick="showRegisterModal()" class="nf-button nf-button-accent px-4 py-2">
                            注册
                        </button>
                    </div>
                    
                    <div id="user-menu" class="hidden">
                        <button type="button" onclick="toggleUserDashboard()" class="nf-button nf-button-primary px-4 py-2">
                            我的订阅
                        </button>
                        <button type="button" onclick="logout()" class="nf-button nf-button-ghost px-4 py-2 ml-2">
                            登出
                        </button>
                    </div>
                    <a id="admin-link" href="/admin/" class="nf-button nf-button-primary hidden px-4 py-2">
                        管理控制台
                    </a>
                </div>
                
                <!-- 移动端按钮组 -->
                <div class="flex md:hidden items-center space-x-2">
                    <button type="button" class="nf-theme-toggle" data-theme-toggle aria-label="切换主题">
                        <span data-theme-icon="moon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg></span>
                    </button>
                    <button id="mobile-menu-button" type="button" onclick="toggleMobileMenu()" class="nf-icon-button p-2" aria-label="打开菜单" aria-controls="mobile-menu" aria-expanded="false" title="打开导航菜单">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 移动端下拉菜单 -->
            <div id="mobile-menu" class="mobile-menu md:hidden">
                <div class="pt-4 pb-2 space-y-2">
                    <div class="nf-user-status px-3 py-2 text-center">
                        <span class="text-sm">身份: </span>
                        <span id="user-role-mobile" class="font-semibold text-yellow-600 dark:text-yellow-400">未登录</span>
                    </div>
                    
                    <div id="auth-buttons-mobile" class="space-y-2">
                        <button type="button" onclick="showLoginModal(); toggleMobileMenu();" class="nf-button nf-button-secondary w-full px-4 py-3">
                            登录
                        </button>
                        <button type="button" onclick="showRegisterModal(); toggleMobileMenu();" class="nf-button nf-button-accent w-full px-4 py-3">
                            注册
                        </button>
                    </div>
                    
                    <div id="user-menu-mobile" class="hidden space-y-2">
                        <button type="button" onclick="toggleUserDashboard(); toggleMobileMenu();" class="nf-button nf-button-primary w-full px-4 py-3">
                            我的订阅
                        </button>
                        <button type="button" onclick="logout(); toggleMobileMenu();" class="nf-button nf-button-ghost w-full px-4 py-3">
                            登出
                        </button>
                        <a id="admin-link-mobile" href="/admin/" class="nf-button nf-button-primary hidden block w-full px-4 py-3 text-center">
                            管理控制台
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main id="main-content" class="container mx-auto px-3 sm:px-4 md:px-6 py-6 md:py-8">
        <section class="nf-page-intro" aria-labelledby="page-title">
            <div>
                <p class="nf-page-kicker">NeoFantasy Live</p>
                <h1 id="page-title">直播列表</h1>
                <p class="nf-intro-details"><span>选择直播或回放开始观看。</span><span>标记为“需要授权”的内容可先提交申请。</span></p>
            </div>
            <p id="show-count" class="nf-show-count" aria-live="polite">正在载入节目…</p>
        </section>
        
        <!-- Player Section (Hidden by default) -->
        <div id="player-section" class="mb-6 md:mb-8 hidden">
            <div class="nf-panel p-3 md:p-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 md:mb-4 gap-2">
                    <h2 id="now-playing-title" class="text-base md:text-xl font-bold break-words max-w-full">正在播放…</h2>
                    <button type="button" onclick="closePlayer()" class="nf-button nf-button-ghost w-full sm:w-auto px-4 py-2 whitespace-nowrap">
                        关闭播放器
                    </button>
                </div>
                <div id="player-container" class="w-full"></div>
            </div>
        </div>

        <!-- Shows Grid -->
        <section id="shows-section" aria-labelledby="shows-heading">
            <h2 id="shows-heading" class="sr-only">直播列表内容</h2>
            <div id="shows-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                <!-- Shows will be dynamically loaded here -->
            </div>
        </section>

        <!-- User Dashboard (Hidden by default) -->
        <div id="user-dashboard" class="mt-6 md:mt-8 hidden">
            <div class="nf-panel p-4 md:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="nf-section-title text-xl md:text-2xl font-bold">我的订阅</h2>
                    <button type="button" onclick="toggleUserDashboard()" class="nf-button nf-button-ghost px-3 py-2" aria-label="关闭我的订阅" title="关闭我的订阅面板">
                        ✕ 关闭
                    </button>
                </div>
                <div id="purchased-shows" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Purchased shows will be displayed here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="nf-dialog nf-auth-dialog w-full mx-4" tabindex="-1">
            <button type="button" class="nf-auth-close" onclick="hideLoginModal()" aria-label="关闭登录窗口">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="nf-auth-header">
                <div class="nf-auth-mark" aria-hidden="true">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.3-7.3M18 5l2 2M15 8l2 2"/></svg>
                </div>
                <h3 id="login-title">用户登录</h3>
                <p>使用统一账户服务管理您的直播权限</p>
            </div>

            <div class="nf-oauth-grid" aria-label="第三方登录">
                <button type="button" id="github-login-button" class="nf-oauth-button" onclick="startOAuthLogin('github')">
                    <span class="nf-oauth-icon nf-github-icon" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .7a11.5 11.5 0 0 0-3.64 22.4c.58.11.79-.25.79-.56v-2.22c-3.22.7-3.9-1.37-3.9-1.37-.52-1.34-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.57-.29-5.27-1.28-5.27-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.16 1.18a10.93 10.93 0 0 1 5.76 0c2.2-1.49 3.16-1.18 3.16-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.83 1.19 3.09 0 4.42-2.71 5.39-5.29 5.68.42.36.79 1.07.79 2.16v3.2c0 .31.21.67.8.56A11.5 11.5 0 0 0 12 .7Z"/></svg></span>
                    <span>GitHub 登录</span>
                </button>
                <button type="button" id="google-login-button" class="nf-oauth-button" onclick="startOAuthLogin('google')">
                    <span class="nf-oauth-icon" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.09-1.92 3.27-4.76 3.27-8.1Z"/><path fill="#34A853" d="M12 23c2.99 0 5.49-.99 7.32-2.68l-3.57-2.77c-.99.66-2.25 1.05-3.75 1.05-2.88 0-5.32-1.95-6.2-4.57H2.11v2.85A11.05 11.05 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.8 14.03A6.64 6.64 0 0 1 5.45 12c0-.71.12-1.4.35-2.03V7.12H2.11A11 11 0 0 0 1 12c0 1.77.42 3.44 1.11 4.88l3.69-2.85Z"/><path fill="#EA4335" d="M12 5.4c1.62 0 3.06.56 4.21 1.64l3.15-3.15A10.55 10.55 0 0 0 12 1 11.05 11.05 0 0 0 2.11 7.12L5.8 9.97C6.68 7.35 9.12 5.4 12 5.4Z"/></svg></span>
                    <span>Google 登录</span>
                </button>
            </div>

            <div class="nf-auth-divider"><span>或使用邮箱</span></div>
            <div class="nf-auth-tabs" role="tablist" aria-label="账户操作">
                <button type="button" class="active" role="tab" aria-selected="true">登录</button>
                <button type="button" role="tab" aria-selected="false" onclick="switchToRegister()">注册</button>
            </div>

            <form id="login-form" class="nf-auth-form" onsubmit="event.preventDefault(); login();">
                <label class="nf-auth-field" for="login-email">
                    <span class="sr-only">用户邮箱</span>
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
                    <input type="email" id="login-email" name="email" required autocomplete="email" spellcheck="false" placeholder="用户邮箱">
                </label>
                <label class="nf-auth-field" for="login-password">
                    <span class="sr-only">密码</span>
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.3-7.3M18 5l2 2M15 8l2 2"/></svg>
                    <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="密码">
                </label>
                <div id="login-error" class="nf-auth-message error hidden" aria-live="polite"></div>
                <button type="submit" id="email-login-button" class="nf-button nf-button-primary nf-auth-submit">登录账户</button>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="register-title">
        <div class="nf-dialog nf-auth-dialog w-full mx-4" tabindex="-1">
            <button type="button" class="nf-auth-close" onclick="hideRegisterModal()" aria-label="关闭注册窗口">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="nf-auth-header">
                <div class="nf-auth-mark" aria-hidden="true">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.3-7.3M18 5l2 2M15 8l2 2"/></svg>
                </div>
                <h3 id="register-title">创建账户</h3>
                <p>验证邮箱后即可使用直播订阅服务</p>
            </div>
            <div class="nf-auth-tabs" role="tablist" aria-label="账户操作">
                <button type="button" role="tab" aria-selected="false" onclick="switchToLogin()">登录</button>
                <button type="button" class="active" role="tab" aria-selected="true">注册</button>
            </div>

            <form id="register-form" class="nf-auth-form" onsubmit="event.preventDefault(); register();">
                <label class="nf-auth-field" for="register-email">
                    <span class="sr-only">用户邮箱</span>
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
                    <input type="email" id="register-email" name="email" required autocomplete="email" spellcheck="false" placeholder="用户邮箱">
                </label>
                <label class="nf-auth-field" for="register-password">
                    <span class="sr-only">设置密码</span>
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.3-7.3M18 5l2 2M15 8l2 2"/></svg>
                    <input type="password" id="register-password" name="new-password" required autocomplete="new-password" minlength="8" placeholder="设置密码（至少 8 位）">
                </label>
                <label class="nf-auth-field" for="register-confirm-password">
                    <span class="sr-only">确认密码</span>
                    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m5 12 4 4L19 6"/></svg>
                    <input type="password" id="register-confirm-password" name="confirm-password" required autocomplete="new-password" minlength="8" placeholder="确认密码">
                </label>
                <div id="register-turnstile" class="nf-turnstile hidden" aria-label="Cloudflare 人机验证"></div>
                <div class="nf-auth-code-row">
                    <label class="nf-auth-field" for="register-code">
                        <span class="sr-only">邮箱验证码</span>
                        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="15" r="4"/><path d="m10.85 12.15 7.3-7.3M18 5l2 2M15 8l2 2"/></svg>
                        <input type="text" id="register-code" name="verification-code" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" required autocomplete="one-time-code" spellcheck="false" placeholder="验证码">
                    </label>
                    <button type="button" id="send-register-code" onclick="sendRegisterCode()" class="nf-button nf-button-secondary">发送验证码</button>
                </div>
                <div id="register-error" class="nf-auth-message error hidden" aria-live="polite"></div>
                <div id="register-success" class="nf-auth-message success hidden" aria-live="polite"></div>
                <button type="submit" class="nf-button nf-button-accent nf-auth-submit">创建账户</button>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'https://api.neofantasy.online';
        const AUTH_BASE_URL = 'https://auth.neofantasy.online';
        const TOKEN_KEY = 'nf_access_token';
        const USER_KEY = 'nf_user';
        const PURCHASED_SHOWS_KEY = 'purchased_shows';
        const OAUTH_PROVIDER_KEY = 'nf_oauth_provider';
        const OAUTH_REDIRECT_KEY = 'nf_oauth_redirect';
        const OAUTH_STATE_KEY = 'nf_oauth_state';
        const SHOW_COUNT_FORMATTER = new Intl.NumberFormat('zh-CN');
        const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
        const formatDescription = (value) => escapeHtml(String(value ?? '').replace(/([。！？!?]|\.(?=\s|$))\s*/g, '$1\n').trim());
        
        // Global variables
        let artPlayer = null;
        let currentShowId = null;
        let purchasedShows = [];
        let modalReturnFocus = null;
        let currentUser = null;
        let authSettings = {};
        let turnstileWidgetId = null;
        let turnstileToken = '';
        let registerCodeTimer = null;
        
        // shows data - 将从 API 动态加载
        let Shows = [];

        // 切换移动端菜单
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const isOpen = menu.classList.toggle('active');
            document.getElementById('mobile-menu-button').setAttribute('aria-expanded', String(isOpen));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadAuthSettings();
            await handleOAuthCallback();
            await restoreSession();
            updateAuthUI(); // 初始化认证状态显示
            loadShows(); // 动态加载节目列表
            loadBuildInfo(); // 加载构建信息
        });

        function currentToken() {
            return localStorage.getItem(TOKEN_KEY) || '';
        }

        async function restoreSession() {
            const token = currentToken();
            try {
                const response = await fetch(`${AUTH_BASE_URL}/api/session/me`, {
                    credentials: 'include',
                    headers: token ? { Authorization: `Bearer ${token}` } : {},
                });
                if (!response.ok) throw new Error('session expired');
                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            } catch (_) {
                currentUser = null;
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USER_KEY);
            }
        }

        async function authFetch(path, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const token = currentToken();
            if (token) headers.Authorization = `Bearer ${token}`;
            return fetch(`${AUTH_BASE_URL}${path}`, {
                ...options,
                headers,
                credentials: 'include',
            });
        }

        async function loadAuthSettings() {
            try {
                const response = await fetch(`${AUTH_BASE_URL}/api/settings`, {
                    credentials: 'include',
                    headers: { Accept: 'application/json' },
                });
                if (!response.ok) throw new Error('认证设置加载失败');
                authSettings = await response.json();
            } catch (error) {
                console.warn('Auth settings unavailable:', error);
                authSettings = {};
            }

            const providers = ['github', 'google'];
            providers.forEach((provider) => {
                const button = document.getElementById(`${provider}-login-button`);
                if (!button) return;
                const configured = authSettings[`enabled_${provider}`] !== false;
                button.disabled = !configured;
                button.title = configured ? `使用 ${provider === 'github' ? 'GitHub' : 'Google'} 登录` : `${provider === 'github' ? 'GitHub' : 'Google'} OAuth 尚未配置`;
            });
        }

        function liveReturnUrl() {
            return `${window.location.origin}${window.location.pathname}`;
        }

        function oauthCallbackUrl(provider) {
            return `${AUTH_BASE_URL}/callback/${provider}`;
        }

        function clearOAuthQuery() {
            const url = new URL(window.location.href);
            ['code', 'state', 'scope', 'authuser', 'prompt', 'error', 'error_description'].forEach((key) => url.searchParams.delete(key));
            window.history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
        }

        function clearOAuthSession() {
            sessionStorage.removeItem(OAUTH_PROVIDER_KEY);
            sessionStorage.removeItem(OAUTH_REDIRECT_KEY);
            sessionStorage.removeItem(OAUTH_STATE_KEY);
        }

        async function startOAuthLogin(provider) {
            const button = document.getElementById(`${provider}-login-button`);
            const errorElement = document.getElementById('login-error');
            errorElement.classList.add('hidden');

            if (authSettings[`enabled_${provider}`] === false) {
                errorElement.textContent = `${provider === 'github' ? 'GitHub' : 'Google'} 登录尚未在认证服务中配置`;
                errorElement.classList.remove('hidden');
                return;
            }

            if (button) {
                button.disabled = true;
                button.setAttribute('aria-busy', 'true');
            }

            const redirectUrl = oauthCallbackUrl(provider);
            const returnTo = liveReturnUrl();
            try {
                sessionStorage.setItem(OAUTH_PROVIDER_KEY, provider);
                sessionStorage.setItem(OAUTH_REDIRECT_KEY, redirectUrl);
                sessionStorage.removeItem(OAUTH_STATE_KEY);
                const loginUrl = new URL('/api/login/redirect', AUTH_BASE_URL);
                loginUrl.search = new URLSearchParams({
                    login_type: provider,
                    redirect_url: redirectUrl,
                    return_to: returnTo,
                }).toString();
                window.location.assign(loginUrl.toString());
            } catch (error) {
                errorElement.textContent = error.message || '第三方登录连接失败';
                errorElement.classList.remove('hidden');
                if (button) {
                    button.disabled = false;
                    button.removeAttribute('aria-busy');
                }
            }
        }

        async function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code') || '';
            const state = params.get('state') || '';
            const providerError = params.get('error_description') || params.get('error') || '';
            if (!code && !providerError) return;

            const provider = sessionStorage.getItem(OAUTH_PROVIDER_KEY) || '';
            const redirectUrl = sessionStorage.getItem(OAUTH_REDIRECT_KEY) || oauthCallbackUrl(provider);
            const expectedState = sessionStorage.getItem(OAUTH_STATE_KEY) || '';
            let message = '';

            try {
                if (providerError) throw new Error(providerError);
                if (!provider || !['github', 'google'].includes(provider)) throw new Error('登录会话已过期，请重新选择登录方式');
                if (expectedState && (!state || state !== expectedState)) throw new Error('登录状态校验失败，请重新发起登录');

                const response = await authFetch('/api/session/oauth-callback', {
                    method: 'POST',
                    body: JSON.stringify({
                        login_type: provider,
                        code,
                        state,
                        redirect_url: redirectUrl,
                    }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.error || '第三方账号兑换失败');
                if (!data.access_token || !data.user) throw new Error('认证服务返回的会话信息不完整');

                localStorage.setItem(TOKEN_KEY, data.access_token);
                currentUser = data.user;
                localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
            } catch (error) {
                message = error.message || '第三方登录失败';
            } finally {
                clearOAuthSession();
                clearOAuthQuery();
            }

            if (message) {
                showLoginModal();
                const errorElement = document.getElementById('login-error');
                errorElement.textContent = message;
                errorElement.classList.remove('hidden');
            }
        }

        async function apiFetch(path, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const token = currentToken();
            if (token) headers.Authorization = `Bearer ${token}`;
            return fetch(`${API_BASE_URL}${path}`, {
                ...options,
                headers,
                credentials: 'include',
            });
        }

        // 更新认证 UI：身份来自 auth 签发的会话，不再读取 URL 中的用户名。
        function updateAuthUI() {
            const username = currentUser?.email || '';
            const isAdmin = currentUser?.role === 'admin';

            if (currentUser) {
                // 用户已登录：隐藏登录/注册按钮，显示用户菜单

                document.getElementById('user-menu').classList.remove('hidden');
                document.getElementById('user-role').textContent = username;
                document.getElementById('user-role').classList.remove('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('user-role').classList.add('text-purple-600', 'dark:text-purple-400');
                
                // 移动端
                document.getElementById('auth-buttons-mobile').classList.add('hidden');
                document.getElementById('user-menu-mobile').classList.remove('hidden');
                document.getElementById('user-role-mobile').textContent = username;
                document.getElementById('user-role-mobile').classList.remove('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('user-role-mobile').classList.add('text-purple-600', 'dark:text-purple-400');

                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-menu').classList.add('hidden');
                document.getElementById('user-role').textContent = '未登录';
                document.getElementById('user-role').classList.remove('text-purple-600', 'dark:text-purple-400');
                document.getElementById('user-role').classList.add('text-yellow-600', 'dark:text-yellow-400');
                
                // 移动端
                document.getElementById('auth-buttons-mobile').classList.remove('hidden');
                document.getElementById('user-menu-mobile').classList.add('hidden');
                document.getElementById('user-role-mobile').textContent = '未登录';
                document.getElementById('user-role-mobile').classList.remove('text-purple-600', 'dark:text-purple-400');
                document.getElementById('user-role-mobile').classList.add('text-yellow-600', 'dark:text-yellow-400');
                document.getElementById('admin-link').classList.add('hidden');
                document.getElementById('admin-link-mobile').classList.add('hidden');
            }
        }

        // Load shows into grid - 从 API 动态加载
        async function loadShows() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/shows`);
                if (!response.ok) {
                    throw new Error('获取节目列表失败');
                }
                const data = await response.json();
                Shows = data.shows || [];
                
                const grid = document.getElementById('shows-grid');
                grid.innerHTML = '';
                document.getElementById('show-count').textContent = `${SHOW_COUNT_FORMATTER.format(Shows.length)} 个节目`;

                if (Shows.length === 0) {
                    grid.innerHTML = '<div class="nf-empty-state col-span-full">当前没有可显示的节目。</div>';
                    return;
                }
                
                Shows.forEach(show => {
                    grid.appendChild(createShowCard(show));
                });
            } catch (error) {
                console.error('加载节目列表错误:', error);
                const grid = document.getElementById('shows-grid');
                document.getElementById('show-count').textContent = '节目加载失败';
                grid.innerHTML = '<div class="nf-empty-state col-span-full">节目列表加载失败，请刷新页面重试。</div>';
            }

        // Create show card element - 修复事件冒泡问题
        function createShowCard(show) {
            const card = document.createElement('article');
            card.className = 'show-card overflow-hidden relative';
            
            const fallbackImagePath = `/image/${encodeURIComponent(show.title)}.jpg`;
            const imagePath = show.image_url || fallbackImagePath;
            const isLive = show.is_live || false; // 数据库字段：蛇形命名
            const requiresAuth = show.requires_auth !== undefined ? show.requires_auth : true; // 数据库字段：蛇形命名
            const escapedTitle = escapeHtml(show.title);
            const escapedShowId = escapeHtml(show.id);
            
            card.innerHTML = `
                <button type="button" class="card-hit-area" aria-label="打开节目：${escapedTitle}" data-show-id="${escapedShowId}"></button>
                <div class="relative show-card-image">
                    <img src="${escapeHtml(imagePath)}" alt="${escapedTitle}" class="w-full h-full object-cover" width="640" height="480" loading="lazy" referrerpolicy="no-referrer">
                    ${isLive ? '<span class="badge badge-live animate-pulse">● 直播中</span>' : '<span class="badge badge-idle">待开播</span>'}
                </div>
                <div class="p-3 md:p-4">
                    <h3 class="text-sm md:text-base font-bold mb-2 line-clamp-2">${escapedTitle}</h3>
                    <p class="show-description text-gray-500 dark:text-gray-400 text-xs md:text-sm mb-3 whitespace-pre-line">${formatDescription(show.description)}</p>
                    <div class="flex justify-between items-center gap-2">
                        <span class="access-label text-xs md:text-sm">
                            ${requiresAuth ? '需要授权' : '公开节目'}
                        </span>
                        <div class="show-card-actions flex gap-2">
                            <button type="button" class="watch-btn nf-button nf-button-primary px-3 md:px-4 py-2 text-sm whitespace-nowrap" data-show-id="${escapedShowId}">
                                观看
                            </button>
                            ${requiresAuth ? `<button type="button" class="request-btn nf-button nf-button-secondary px-3 py-2 text-sm whitespace-nowrap" data-show-id="${escapedShowId}">申请</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            const cardHitArea = card.querySelector('.card-hit-area');
            cardHitArea.addEventListener('click', function() {
                handleShowClick(this.getAttribute('data-show-id'));
            });

            const coverImage = card.querySelector('.show-card-image img');
            coverImage.addEventListener('error', () => {
                if (coverImage.dataset.fallbackApplied === 'true') return;
                coverImage.dataset.fallbackApplied = 'true';
                coverImage.src = fallbackImagePath;
            });

            // 为观看按钮单独添加事件监听器
            const watchBtn = card.querySelector('.watch-btn');
            watchBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // 阻止事件冒泡
                handleShowClick(this.getAttribute('data-show-id'));
            });
            const requestBtn = card.querySelector('.request-btn');
            if (requestBtn) {
                requestBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    requestPermission(this.getAttribute('data-show-id'));
                });
            }
            
            return card;
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('login-modal').classList.contains('active')) hideLoginModal();
                else if (document.getElementById('register-modal').classList.contains('active')) hideRegisterModal();
                return;
            }
            if (!artPlayer) return; // 只在播放器存在时响应快捷键
            
            if (e.code === 'Space') {
                e.preventDefault();
                artPlayer.toggle();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                artPlayer.currentTime = Math.max(0, artPlayer.currentTime - 5);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                artPlayer.currentTime = artPlayer.currentTime + 5;
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                artPlayer.volume = Math.min(1, artPlayer.volume + 0.1);
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                artPlayer.volume = Math.max(0, artPlayer.volume - 0.1);
            } else if (e.code === 'KeyF' || e.code === 'Enter') {
                e.preventDefault();
                artPlayer.fullscreen = !artPlayer.fullscreen;
            }
        });

        // Handle show click - 根据 requires_auth 决定是否需要登录
        function handleShowClick(showId) {
            const show = Shows.find((item) => String(item.id) === String(showId));
            if (!show) {
                alert('节目不存在');
                return;
            }

            currentShowId = showId;
            const requiresAuth = show.requires_auth !== undefined ? show.requires_auth : true;
            
            // 如果节目不需要鉴权，直接允许观看
            if (!requiresAuth) {
                // 在新标签页打开播放器，无需 token
                const playerUrl = `player.html?show_id=${encodeURIComponent(showId)}`;
                window.open(playerUrl, '_blank');
                return;
            }
            
            // 需要鉴权的节目，检查是否登录
            if (!currentUser) {
                showLoginModal();
                return;
            }
            
            // 已登录，在新标签页打开播放器
            const playerUrl = `player.html?show_id=${encodeURIComponent(showId)}`;
            window.open(playerUrl, '_blank');
        }

        async function requestPermission(showId) {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            const reason = prompt('请填写申请原因（可选）', '申请观看该节目');
            if (reason === null) return;
            try {
                const response = await apiFetch('/api/permission-requests', {
                    method: 'POST',
                    body: JSON.stringify({ show_id: showId, reason }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || '申请失败');
                alert('申请已提交，请等待管理员审核。');
            } catch (error) {
                alert(error.message || '申请失败');
            }
        }

        // Play stream with ArtPlayer
        function playStream(url, showId) {
            document.getElementById('player-section').classList.remove('hidden');
            const show = Shows.find((item) => String(item.id) === String(showId));
            const showTitle = show ? show.title : '节目';
            document.getElementById('now-playing-title').textContent = `正在播放: ${showTitle}`;
            document.getElementById('player-container').style.display = 'block';
            
            // Scroll to player
            document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
            
            // Destroy existing player if any
            if (artPlayer) {
                artPlayer.destroy();
            }
            
            // Initialize ArtPlayer
            artPlayer = new Artplayer({
                container: '#player-container',
                url: url,
                theme: '#bcd979',
                type: 'm3u8',
                customType: {
                    m3u8: function(video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    }
                },
                autoplay: true,
                autoSize: true,
                autoMini: true,
                loop: false,
                flip: true,
                playbackRate: true,
                aspectRatio: true,
                setting: true,
                hotkey: true,
                pip: true,
                mutex: true,
                fullscreen: true,
                fullscreenWeb: true,
                subtitle: {
                    url: '',
                },
                moreVideoAttr: {
                    preload: 'auto',
                },
            });

            artPlayer.on('ready', () => {
                console.log('Player is ready');
            });
            
            artPlayer.on('error', (err) => {
                console.error('Player error:', err);
                alert('播放器错误: ' + err.message);
            });
        }

        // Close player
        function closePlayer() {
            if (artPlayer) {
                artPlayer.destroy();
                artPlayer = null;
            }
            document.getElementById('player-section').classList.add('hidden');
            document.getElementById('player-container').style.display = 'none';
        }

        // 登录和注册全部交给 auth 服务；本页只保存短期访问令牌作为 Cookie 失效时的回退。
        async function login() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const loginError = document.getElementById('login-error');
            const submitButton = document.getElementById('email-login-button');
            loginError.classList.add('hidden');
            
            if (!email || !password) {
                loginError.textContent = '请填写完整信息';
                loginError.classList.remove('hidden');
                return;
            }

            try {
                submitButton.disabled = true;
                submitButton.textContent = '登录中…';
                const response = await authFetch('/api/session/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem(TOKEN_KEY, data.access_token || '');
                    currentUser = data.user;
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    hideLoginModal();
                    updateAuthUI();
                    alert('登录成功！');
                } else {
                    loginError.textContent = data.error || '登录失败';
                    loginError.classList.remove('hidden');
                }
            } catch (e) {
                loginError.textContent = '认证服务连接失败，请稍后重试';
                loginError.classList.remove('hidden');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = '登录账户';
            }
        }

        function renderTurnstile(attempt = 0) {
            const container = document.getElementById('register-turnstile');
            const siteKey = authSettings.cf_turnstile_site_key || '';
            if (!container || !siteKey) {
                container?.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            if (turnstileWidgetId !== null) return;

            if (!window.turnstile?.render) {
                if (attempt < 50) window.setTimeout(() => renderTurnstile(attempt + 1), 120);
                else {
                    const errorElement = document.getElementById('register-error');
                    errorElement.textContent = 'Cloudflare 验证组件加载超时，请刷新页面重试';
                    errorElement.classList.remove('hidden');
                }
                return;
            }

            turnstileWidgetId = window.turnstile.render(container, {
                sitekey: siteKey,
                theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light',
                language: 'zh-CN',
                appearance: 'interaction-only',
                action: 'email_register',
                callback: (token) => { turnstileToken = token; },
                'expired-callback': () => { turnstileToken = ''; },
                'timeout-callback': () => { turnstileToken = ''; },
                'error-callback': () => {
                    turnstileToken = '';
                    const errorElement = document.getElementById('register-error');
                    errorElement.textContent = 'Cloudflare 人机验证失败，请重试';
                    errorElement.classList.remove('hidden');
                },
            });
        }

        function resetTurnstile() {
            turnstileToken = '';
            if (turnstileWidgetId !== null && window.turnstile?.reset) {
                window.turnstile.reset(turnstileWidgetId);
            }
        }

        window.addEventListener('nf-theme-change', () => {
            if (turnstileWidgetId !== null && window.turnstile?.remove) {
                window.turnstile.remove(turnstileWidgetId);
                turnstileWidgetId = null;
                turnstileToken = '';
            }
            if (document.getElementById('register-modal')?.classList.contains('active')) {
                renderTurnstile();
            }
        });

        function startRegisterCodeCountdown(seconds) {
            const button = document.getElementById('send-register-code');
            let remaining = Math.max(1, Number(seconds) || 60);
            window.clearInterval(registerCodeTimer);
            button.disabled = true;
            button.textContent = `${remaining} 秒后重试`;
            registerCodeTimer = window.setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    window.clearInterval(registerCodeTimer);
                    registerCodeTimer = null;
                    button.disabled = false;
                    button.textContent = '发送验证码';
                    return;
                }
                button.textContent = `${remaining} 秒后重试`;
            }, 1000);
        }

        async function sendRegisterCode() {
            const email = document.getElementById('register-email').value.trim();
            const errorElement = document.getElementById('register-error');
            const sendButton = document.getElementById('send-register-code');
            errorElement.classList.add('hidden');
            if (!email) {
                errorElement.textContent = '请先填写邮箱';
                errorElement.classList.remove('hidden');
                return;
            }
            if (authSettings.cf_turnstile_site_key && !turnstileToken) {
                errorElement.textContent = '请先完成 Cloudflare 人机验证';
                errorElement.classList.remove('hidden');
                renderTurnstile();
                return;
            }
            try {
                sendButton.disabled = true;
                sendButton.textContent = '发送中…';
                const response = await authFetch('/api/session/verify-code', {
                    method: 'POST',
                    body: JSON.stringify({ email, cf_token: turnstileToken, cf_action: 'email_register' }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.error || '验证码发送失败');
                const successElement = document.getElementById('register-success');
                successElement.textContent = `验证码已发送，有效期 ${data.timeout} 秒`;
                successElement.classList.remove('hidden');
                startRegisterCodeCountdown(data.timeout);
            } catch (error) {
                errorElement.textContent = error.message || '验证码发送失败';
                errorElement.classList.remove('hidden');
                sendButton.disabled = false;
                sendButton.textContent = '发送验证码';
            } finally {
                if (authSettings.cf_turnstile_site_key) resetTurnstile();
            }
        }

        async function register() {
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const code = document.getElementById('register-code').value.trim();
            const errorElement = document.getElementById('register-error');
            const successElement = document.getElementById('register-success');
            
            errorElement.classList.add('hidden');
            successElement.classList.add('hidden');
            
            // Validation
            if (!email || !password || !code) {
                errorElement.textContent = '邮箱、密码和验证码不能为空';
                errorElement.classList.remove('hidden');
                return;
            }
            
            if (password !== confirmPassword) {
                errorElement.textContent = '两次输入的密码不一致';
                errorElement.classList.remove('hidden');
                return;
            }
            
            if (password.length < 8) {
                errorElement.textContent = '密码长度至少8位';
                errorElement.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await authFetch('/api/session/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, code, cf_token: turnstileToken })
                });
                const data = await response.json();
                
                if (response.ok) {
                    successElement.textContent = '注册成功，已自动登录';
                    successElement.classList.remove('hidden');
                    localStorage.setItem(TOKEN_KEY, data.access_token || '');
                    currentUser = data.user;
                    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
                    updateAuthUI();
                    setTimeout(hideRegisterModal, 500);
                } else {
                    errorElement.textContent = data.error || '注册失败';
                    errorElement.classList.remove('hidden');
                }
            } catch (e) {
                console.error('Register error:', e);
                errorElement.textContent = '网络错误，请检查连接';
                errorElement.classList.remove('hidden');
            }
        }

        // Logout function
        async function logout() {
            if (confirm('确定要退出登录吗？')) {
                try { await authFetch('/api/session/logout', { method: 'POST' }); } catch (_) {}
                localStorage.removeItem(TOKEN_KEY);
                localStorage.removeItem(USER_KEY);
                localStorage.removeItem(PURCHASED_SHOWS_KEY);
                currentUser = null;
                
                // 关闭播放器
                closePlayer();
                
                // 更新UI显示为未登录状态
                updateAuthUI();
                
                // 更新用户仪表板
                updateUserDashboard();
                
                // 提示用户
                alert('已退出登录');
            }
        }

        function updatePurchasedShows() {
            const stored = localStorage.getItem(PURCHASED_SHOWS_KEY);
            try { purchasedShows = stored ? JSON.parse(stored) : []; } catch (_) { purchasedShows = []; }
        }

        // Get purchased shows
        function getPurchasedShows() {
            return purchasedShows;
        }

        // Modal functions
        function showLoginModal() {
            modalReturnFocus = document.activeElement;
            document.getElementById('login-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            requestAnimationFrame(() => document.getElementById('login-email').focus());
        }
        
        function hideLoginModal() {
            document.getElementById('login-modal').classList.remove('active');
            document.getElementById('login-error').classList.add('hidden');
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
            document.body.style.overflow = '';
            if (modalReturnFocus instanceof HTMLElement) modalReturnFocus.focus();
        }
        
        function showRegisterModal() {
            modalReturnFocus = document.activeElement;
            document.getElementById('register-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            renderTurnstile();
            requestAnimationFrame(() => document.getElementById('register-email').focus());
        }
        
        function hideRegisterModal() {
            document.getElementById('register-modal').classList.remove('active');
            document.getElementById('register-error').classList.add('hidden');
            document.getElementById('register-success').classList.add('hidden');
            document.getElementById('register-email').value = '';
            document.getElementById('register-password').value = '';
            document.getElementById('register-confirm-password').value = '';
            document.getElementById('register-code').value = '';
            resetTurnstile();
            document.body.style.overflow = '';
            if (modalReturnFocus instanceof HTMLElement) modalReturnFocus.focus();
        }
        
        function switchToRegister() {
            document.getElementById('login-modal').classList.remove('active');
            document.getElementById('register-modal').classList.add('active');
            document.getElementById('login-error').classList.add('hidden');
            renderTurnstile();
            requestAnimationFrame(() => document.getElementById('register-email').focus());
        }
        
        function switchToLogin() {
            document.getElementById('register-modal').classList.remove('active');
            document.getElementById('login-modal').classList.add('active');
            document.getElementById('register-error').classList.add('hidden');
            document.getElementById('register-success').classList.add('hidden');
            requestAnimationFrame(() => document.getElementById('login-email').focus());
        }

        // Toggle user dashboard
        function toggleUserDashboard() {
            const dashboard = document.getElementById('user-dashboard');
            dashboard.classList.toggle('hidden');
            if (!dashboard.classList.contains('hidden')) {
                updateUserDashboard();
                dashboard.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Load build info from GitHub API
        async function loadBuildInfo() {
            const owner = 'yuuuiv';
            const repo = 'LIVE_Streaming';
            
            try {
                // 获取最新的提交信息
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/commits?per_page=1`, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch commit info');
                }
                
                const data = await response.json();
                if (data.length > 0) {
                    const commit = data[0];
                    const commitHash = commit.sha.substring(0, 7);
                    const commitDate = new Date(commit.commit.author.date);
                    const formattedDate = commitDate.toLocaleDateString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    // 更新提交哈希
                    document.getElementById('commit-hash').textContent = commitHash;
                    document.getElementById('commit-link').href = `https://github.com/${owner}/${repo}/commit/${commit.sha}`;
                    
                    // 更新构建时间
                    document.getElementById('build-date').textContent = `Updated: ${formattedDate}`;
                    
                    // 添加提示文本
                    document.getElementById('build-info').title = `点击查看完整提交信息\n${commit.commit.message.split('\n')[0]}`;
                }
            } catch (error) {
                console.error('Error loading build info:', error);
                // 失败时显示默认值
                document.getElementById('commit-hash').textContent = 'Unknown';
                document.getElementById('build-date').textContent = 'Updated: -';
            }
        }

        // Update user dashboard - 实时获取用户订阅，不依赖缓存
        async function updateUserDashboard() {
            const container = document.getElementById('purchased-shows');
            if (!currentUser) {
                container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-full text-center py-8">请登录后查看订阅</p>';
                return;
            }
            
            // 显示加载状态
            container.innerHTML = '<p class="text-gray-400 dark:text-gray-500 col-span-full text-center py-8">正在同步订阅信息…</p>';
            
            try {
                // 从后端实时获取用户的已购节目列表
                const response = await apiFetch('/api/user-purchases');
                
                if (!response.ok) {
                    container.innerHTML = '<p class="text-red-500 dark:text-red-400 col-span-full text-center py-8">获取订阅失败，请稍后重试</p>';
                    return;
                }
                
                const data = await response.json();
                const purchasedShows = data.purchased_shows || [];
                
                // 仅作界面缓存，权限判断始终由后端完成。
                localStorage.setItem(PURCHASED_SHOWS_KEY, JSON.stringify(purchasedShows));
                
                // 清空容器
                container.innerHTML = '';
                
                // 如果没有购买任何节目
                if (purchasedShows.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-full text-center py-8">您还没有购买任何节目</p>';
                    return;
                }
                
                // 遍历所有节目，如果已购买则显示
                Shows.forEach(show => {
                    if (purchasedShows.includes(show.id)) {
                        const card = document.createElement('div');
                        
                        card.className = 'subscription-card p-4 cursor-pointer transition';
                        card.onclick = () => {
                            toggleUserDashboard();
                            handleShowClick(show.id);
                        };
                        
                        card.innerHTML = `
                            <h4 class="text-sm font-bold mb-2">${escapeHtml(show.title)}</h4>
                            <p class="text-sm text-gray-500 dark:text-gray-300 mb-2 whitespace-pre-line">${formatDescription(show.description)}</p>
                            <span class="text-xs text-nf-olive font-semibold">已加入订阅</span>
                        `;
                        container.appendChild(card);
                    }
                });
                
            } catch (err) {
                console.error('获取订阅失败:', err);
                container.innerHTML = '<p class="text-red-500 dark:text-red-400 col-span-full text-center py-8">获取订阅失败，请稍后重试</p>';
            }
        }
        
        // Close modals when clicking outside
        document.addEventListener('click', (e) => {
            const loginModal = document.getElementById('login-modal');
            const registerModal = document.getElementById('register-modal');
            
            if (loginModal.classList.contains('active') && e.target === loginModal) {
                hideLoginModal();
            }
            
            if (registerModal.classList.contains('active') && e.target === registerModal) {
                hideRegisterModal();
            }
        });
    </script>
