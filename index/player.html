<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放器 - NeoFantasy Live</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    
    <!-- Theme Color - for browsers that support it -->
    <meta name="theme-color" content="#fff3d6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)">
    
    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Windows Tiles -->
    <meta name="msapplication-TileColor" content="#fff3d6">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class',
    }
    </script>
    
    <!-- ArtPlayer CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* 防止全屏时滚动条闪烁 */
        html:fullscreen,
        html:-webkit-full-screen,
        html:-moz-full-screen,
        html:-ms-fullscreen {
            overflow: hidden !important;
        }
        
        /* 防止全屏时出现滚动条 */
        #player-container:fullscreen,
        #player-container:-webkit-full-screen,
        #player-container:-moz-full-screen,
        #player-container:-ms-fullscreen {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
        }
        
        #player-container {
            width: 100%;
            height: 100%;
        }
        
        #error-container {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            z-index: 9998;
            pointer-events: none;
        }
        
        /* 错误提示激活时允许交互 */
        #error-container[style*="display: flex"] {
            pointer-events: auto;
        }
        
        /* 全屏模式下的错误提示样式 - 沉浸式背景 */
        #player-container:fullscreen #error-container,
        #player-container:-webkit-full-screen #error-container,
        #player-container:-moz-full-screen #error-container,
        #player-container:-ms-fullscreen #error-container {
            background: #000000;
            position: fixed;
            inset: 0;
            z-index: 100000;
        }
        
        /* 全屏错误提示的文字大小调整 */
        #player-container:fullscreen #error-container .error-icon,
        #player-container:-webkit-full-screen #error-container .error-icon,
        #player-container:-moz-full-screen #error-container .error-icon,
        #player-container:-ms-fullscreen #error-container .error-icon {
            font-size: 6rem;
        }
        
        #player-container:fullscreen #error-container .error-title,
        #player-container:-webkit-full-screen #error-container .error-title,
        #player-container:-moz-full-screen #error-container .error-title,
        #player-container:-ms-fullscreen #error-container .error-title {
            font-size: 2.5rem;
        }
        
        #player-container:fullscreen #error-container .error-message,
        #player-container:-webkit-full-screen #error-container .error-message,
        #player-container:-moz-full-screen #error-container .error-message,
        #player-container:-ms-fullscreen #error-container .error-message {
            font-size: 1.5rem;
        }
        
        #loading-container {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .spinner {
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: rgb(139, 92, 246);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .error-message {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }
        
        .back-button {
            padding: 0.75rem 2rem;
            background: rgb(139, 92, 246);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .back-button:hover {
            background: rgb(124, 58, 237);
        }

        .back-button-red {
            background: #ef4444 !important;
        }
        .back-button-red:hover {
            background: #dc2626 !important;
        }

        /* 被踢下线遮罩样式已移除 */

        /* ArtPlayer 进度条修复，防止被截断 */
        .art-video-player {
            width: 100% !important;
            height: 100% !important;
        }
        
        .art-bottom {
            padding-bottom: 0 !important;
        }
        
        .art-controls {
            bottom: 0 !important;
        }
        
        /* 强制设置控制条位置，确保完全可见 */
        .art-control-bar {
            bottom: 2px !important;
        }
        
        /* 进度条样式优化 - 增加悬停高度，便于点击 */
        .art-control-progress {
            cursor: pointer;
            height: 5px;
            transition: height 0.2s ease;
        }
        
        /* 进度条悬停时增大高度 */
        .art-control-progress:hover {
            height: 8px;
        }
        
        /* 全屏下的进度条优化 */
        #player-container:fullscreen .art-control-progress,
        #player-container:-webkit-full-screen .art-control-progress,
        #player-container:-moz-full-screen .art-control-progress,
        #player-container:-ms-fullscreen .art-control-progress {
            height: 6px;
        }
        
        #player-container:fullscreen .art-control-progress:hover,
        #player-container:-webkit-full-screen .art-control-progress:hover,
        #player-container:-moz-full-screen .art-control-progress:hover,
        #player-container:-ms-fullscreen .art-control-progress:hover {
            height: 10px;
        }
        
        /* 缓存条颜色与进度条区分 */
        .art-control-progress .art-control-progress-load {
            background-color: rgba(255, 255, 255, 0.3) !important;
        }
        
        /* 当前进度条 */
        .art-control-progress .art-control-progress-current {
            background-color: #8b5cf6 !important;
        }
        
        /* 确保音量控件显示 */
        .art-control-volume {
            display: flex !important;
        }
        
        /* 隐藏 ArtPlayer 默认的垂直音量面板（黑色方框） */
        .art-volume-panel {
            display: none !important;
        }
        
        /* 自定义音量百分比显示在控制栏上 */
        .art-control-volume-percentage {
            display: flex;
            align-items: center;
            margin: 0 0.25rem;
            padding: 0;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: default;
            -webkit-user-select: none;
            user-select: none;
            white-space: nowrap;
        }
        
        /* 全屏模式下控制栏显示的微调 */
        #player-container:fullscreen .art-control-volume-percentage,
        #player-container:-webkit-full-screen .art-control-volume-percentage,
        #player-container:-moz-full-screen .art-control-volume-percentage,
        #player-container:-ms-fullscreen .art-control-volume-percentage {
            font-size: 1rem;
            margin: 0 0.5rem;
        }
        
        /* ArtPlayer 控制栏在全屏下的梯度背景 */
        .art-video-player:fullscreen .art-controls,
        .art-video-player:-webkit-full-screen .art-controls,
        .art-video-player:-moz-full-screen .art-controls,
        .art-video-player:-ms-fullscreen .art-controls {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent) !important;
        }
        
        /* 加载容器在全屏下的层级 */
        #loading-container:fullscreen,
        #loading-container:-webkit-full-screen,
        #loading-container:-moz-full-screen,
        #loading-container:-ms-fullscreen {
            z-index: 9997;
        }

        /* --- Volume Slider Styles --- */
        .art-control-volume-slider {
            display: flex;
            align-items: center;
            width: 120px;
            height: 100%;
            margin-left: 10px;
            cursor: pointer;
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .volume-slider-track {
            width: 100%;
            height: 8px;
            background: #99999980;
            border-radius: 4px;
            position: relative;
            /* overflow: hidden;  Remove overflow hidden so thumb can protrude if needed, though thumb is small enough */
        }

        .volume-slider-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #3498db;
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
        }

        .volume-slider-thumb {
            width: 16px;
            height: 16px;
            background: #3498db;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        /* Transition for non-dragging updates */
        .art-control-volume-slider:not(.is-dragging) .volume-slider-fill,
        .art-control-volume-slider:not(.is-dragging) .volume-slider-thumb {
            transition: width 300ms ease-out, left 300ms ease-out;
        }

        /* Hover/Active Feedback */
        .art-control-volume-slider:hover .volume-slider-thumb,
        .art-control-volume-slider:focus .volume-slider-thumb,
        .art-control-volume-slider.is-dragging .volume-slider-thumb {
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Muted State */
        .art-control-volume-slider.is-muted {
            opacity: 0.5;
            /* cursor: not-allowed;  User requested disabled style, but interaction might still be needed to unmute. Keeping pointer. */
        }

        /* Settings Panel Customization */
        .art-setting {
            top: auto !important;
            bottom: 50px !important;
            left: auto !important;
            right: 60px !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    
    <!-- Loading Container -->
    <div id="loading-container">
        <div class="spinner"></div>
        <p class="mt-4 text-lg">正在加载视频...</p>
    </div>
    
    <!-- Error Container -->
    <div id="error-container">
        <div class="error-icon">❌</div>
        <div class="error-title" id="error-title">加载失败</div>
        <div class="error-message" id="error-message">未知错误</div>
        <button class="back-button" onclick="goBack()">返回首页</button>
    </div>
    
    <!-- Player Container -->
    <div id="player-container"></div>

    <!-- Kick Overlay 已移除 -->
    
    <script>
        // 自动检测 API 地址 - 开发环境使用 localhost，生产环境使用生产 API
        const isDevelopment = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE_URL = isDevelopment ? 'http://localhost:5000' : 'https://api.neofantasy.online';
        let artPlayer = null;
        // 心跳/异地登录检测相关变量已移除
        const VOLUME_STEP = 0.1; 
        let volumePercentageControl = null;
        let volumeSliderUpdate = null;
        
        // 更新控制栏上的音量百分比显示
        function updateVolumeDisplay() {
            if (!artPlayer || !volumePercentageControl) return;
            
            // 直接读取最新的播放器状态，避免事件参数造成的延迟
            const currentVolume = artPlayer.volume;
            const isMuted = artPlayer.muted;
            
            if (isMuted || currentVolume === 0) {
                volumePercentageControl.textContent = '静音';
            } else {
                const percent = Math.round(currentVolume * 100);
                volumePercentageControl.textContent = percent + '%';
            }
        }

        function syncVolumeUI() {
            if (!artPlayer) return;
            updateVolumeDisplay();
            if (typeof volumeSliderUpdate === 'function') {
                const v = artPlayer.muted ? 0 : artPlayer.volume;
                volumeSliderUpdate(v);
            }
        }

        function adjustVolume(delta) {
            if (!artPlayer) return;
            const nextVolume = Math.min(1, Math.max(0, Math.round((artPlayer.volume + delta) * 10) / 10));
            artPlayer.volume = nextVolume;
            syncVolumeUI();
            console.log('音量已调整至:', Math.round(nextVolume * 100) + '%');
        }
        
        // 初始化主题 - 从 localStorage 读取
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('bg-gray-900');
                document.body.classList.add('bg-gray-50', 'text-gray-900');
            }
        }
        
        // 从 URL 获取参数
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                show_id: params.get('show_id'),
                user_token: params.get('user_token')
            };
        }
        
        // 显示错误信息
        function showError(title, message, icon = '❌') {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('player-container').style.display = 'none';
            
            const errorContainer = document.getElementById('error-container');
            errorContainer.style.display = 'flex';
            
            document.querySelector('.error-icon').textContent = icon;
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = message;
        }
        
        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loading-container').style.display = 'none';
        }
        
        // 返回首页
        function goBack() {
            window.close();
            // 如果 window.close() 失败（非脚本打开的窗口），则跳转回首页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 100);
        }
        
        // 初始化播放器
        function initPlayer(streamUrl, showId) {
            hideLoading();
            document.getElementById('player-container').style.display = 'block';
            
            artPlayer = new Artplayer({
                container: '#player-container',
                url: streamUrl,
                type: 'm3u8',
                customType: {
                    m3u8: function(video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls({
                                enableWorker: true,
                                lowLatencyMode: true,
                            });
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    }
                },
                // 基本设置
                autoplay: true,
                autoSize: true,  // 启用自动尺寸同步
                autoMini: false,
                loop: false,
                volume: 0.7,
                muted: false,
                
                // 控件设置
                flip: true,
                playbackRate: false,
                aspectRatio: true,
                screenshot: true,
                setting: true,
                hotkey: false,  // 禁用内置快捷键，使用自定义键盘监听器
                pip: true,
                mutex: true,
                fullscreen: true,
                fullscreenWeb: true,
                
                // 禁用原生提示通知（仅保留自定义音量显示）
                notices: false,
                
                // 音量控件
                volume: 0.7,
                
                // 字幕设置
                subtitle: {
                    url: '',
                    style: {
                        color: '#fff',
                        fontSize: '20px',
                    },
                },
                
                // 播放设置
                moreVideoAttr: {
                    preload: 'auto',
                    'webkit-playsinline': true,
                    'playsinline': true,
                },
                
                // 设置选项
                settings: [
                    {
                        html: '播放速度',
                        selector: [
                            { html: '2.0x', value: 2.0 },
                            { html: '1.75x', value: 1.75 },
                            { html: '1.5x', value: 1.5 },
                            { html: '1.25x', value: 1.25 },
                            { html: '1.0x', value: 1.0, default: true },
                            { html: '0.75x', value: 0.75 },
                            { html: '0.5x', value: 0.5 },
                        ],
                        onSelect: function (item) {
                            artPlayer.playbackRate = item.value;
                            return item.html;
                        },
                    },
                ],
                
                // 自定义控制栏 - 在音量图标右侧显示音量百分比
                // position: 'left' 位置在左侧，index: 11 确保在音量图标（index 10）之后
                controls: [
                    {
                        position: 'left',
                        index: 11,
                        html: '<div class="art-control-volume-percentage">--</div>',
                        name: 'volumePercentage',
                        tooltip: '当前音量',
                        mounted($control) {
                            // mounted 生命周期：在控制项挂载后立即初始化音量显示
                            volumePercentageControl = $control.querySelector('.art-control-volume-percentage');
                            if (volumePercentageControl) {
                                // 确保获取到最新的音量值
                                setTimeout(() => {
                                    updateVolumeDisplay();
                                }, 50);
                            }
                        }
                    },
                    {
                        position: 'left',
                        index: 12,
                        html: `
                            <div class="art-control-volume-slider" tabindex="0" aria-label="Volume Slider" role="slider" aria-valuemin="0" aria-valuemax="100">
                                <div class="volume-slider-track">
                                    <div class="volume-slider-fill"></div>
                                    <div class="volume-slider-thumb"></div>
                                </div>
                            </div>
                        `,
                        name: 'volumeSlider',
                        mounted($control) {
                            const slider = $control.querySelector('.art-control-volume-slider');
                            const track = slider.querySelector('.volume-slider-track');
                            const fill = slider.querySelector('.volume-slider-fill');
                            const thumb = slider.querySelector('.volume-slider-thumb');
                            let isDragging = false;
                            let rafPending = false;

                            function updateSlider(volume) {
                                const percent = volume * 100;
                                fill.style.width = `${percent}%`;
                                thumb.style.left = `${percent}%`;
                                slider.setAttribute('aria-valuenow', Math.round(percent));
                                
                                const isMuted = volume === 0 || (artPlayer && artPlayer.muted);
                                if (isMuted) {
                                    slider.classList.add('is-muted');
                                } else {
                                    slider.classList.remove('is-muted');
                                }
                                
                                // 实时更新音量百分比显示
                                if (volumePercentageControl) {
                                    // 拖动时优先显示当前值（视为即将解除静音），非拖动时遵循 artPlayer 静音状态
                                    // 只有在非拖动状态下，才显示"静音"文字；拖动时显示数值以便用户知道调到了多少
                                    const showMutedText = !isDragging && isMuted;
                                    volumePercentageControl.textContent = showMutedText ? '静音' : Math.round(percent) + '%';
                                }
                            }

                            volumeSliderUpdate = updateSlider;

                            function getVolumeFromEvent(e) {
                                const rect = track.getBoundingClientRect();
                                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                                let percent = (clientX - rect.left) / rect.width;
                                percent = Math.max(0, Math.min(1, percent));
                                return percent;
                            }

                            function updateVolumeFromEvent(e) {
                                const newVolume = getVolumeFromEvent(e);
                                
                                updateSlider(newVolume);
                                
                                if (!rafPending) {
                                    rafPending = true;
                                    requestAnimationFrame(() => {
                                        if (!artPlayer) {
                                            rafPending = false;
                                            return;
                                        }
                                        artPlayer.volume = newVolume;
                                        if (artPlayer.muted && newVolume > 0) artPlayer.muted = false;
                                        rafPending = false;
                                    });
                                }
                            }

                            setTimeout(() => {
                                if (!artPlayer) return;
                                updateSlider(artPlayer.muted ? 0 : artPlayer.volume);
                            }, 50);
            
                            if (artPlayer && typeof artPlayer.on === 'function') {
                                artPlayer.on('video:volumechange', () => {
                                    if (!artPlayer) return;
                                    if (!isDragging) {
                                        updateSlider(artPlayer.muted ? 0 : artPlayer.volume);
                                    }
                                });
                            }

                            const onMouseDown = (e) => {
                                isDragging = true;
                                slider.classList.add('is-dragging');
                                updateVolumeFromEvent(e);
                                window.addEventListener('mousemove', onMouseMove);
                                window.addEventListener('mouseup', onMouseUp);
                            };

                            const onMouseMove = (e) => {
                                if (isDragging) {
                                    e.preventDefault();
                                    updateVolumeFromEvent(e);
                                }
                            };

                            const onMouseUp = () => {
                                isDragging = false;
                                slider.classList.remove('is-dragging');
                                window.removeEventListener('mousemove', onMouseMove);
                                window.removeEventListener('mouseup', onMouseUp);
                            };

                            slider.addEventListener('mousedown', onMouseDown);

                            slider.addEventListener('touchstart', (e) => {
                                isDragging = true;
                                slider.classList.add('is-dragging');
                                updateVolumeFromEvent(e);
                            }, { passive: false });

                            slider.addEventListener('touchmove', (e) => {
                                if (isDragging) {
                                    e.preventDefault();
                                    updateVolumeFromEvent(e);
                                }
                            }, { passive: false });

                            slider.addEventListener('touchend', () => {
                                isDragging = false;
                                slider.classList.remove('is-dragging');
                            });

                            slider.addEventListener('keydown', (e) => {
                                e.stopPropagation();
                                if (!artPlayer) return;
                                let currentVolume = artPlayer.volume;
                                if (artPlayer.muted) currentVolume = 0;
                                
                                if (e.key === 'ArrowLeft') {
                                    e.preventDefault();
                                    const newVol = Math.max(0, currentVolume - 0.05);
                                    artPlayer.volume = newVol;
                                    if (artPlayer.muted && newVol > 0) artPlayer.muted = false;
                                } else if (e.key === 'ArrowRight') {
                                    e.preventDefault();
                                    const newVol = Math.min(1, currentVolume + 0.05);
                                    artPlayer.volume = newVol;
                                    if (artPlayer.muted && newVol > 0) artPlayer.muted = false;
                                }
                            });
                        }
                    }
                ],
                
                // 移动端优化
                autoOrientation: true,
                lock: true,  // 移动端锁屏功能
            });

            if (!artPlayer || typeof artPlayer.on !== 'function') {
                console.error('ArtPlayer 初始化失败:', artPlayer);
                showError(
                    '播放器初始化失败',
                    '无法创建播放器实例，请刷新页面后重试',
                    '⚠️'
                );
                return;
            }
            
            artPlayer.on('ready', () => {
                console.log('Player is ready');
                
                // 在 ready 阶段，volumePercentageControl 可能还未通过 mounted 回调初始化
                // 这里作为备用方案确保获取正确的引用
                if (!volumePercentageControl) {
                    volumePercentageControl = document.querySelector('.art-control-volume-percentage');
                }
                
                // 强制初始化音量显示 - 确保立即显示实际音量值，防止显示为 --
                // 使用 setTimeout 确保 DOM 完全就绪
                setTimeout(() => {
                    if (volumePercentageControl && artPlayer) {
                        updateVolumeDisplay();
                        console.log('强制初始化音量百分比:', volumePercentageControl.textContent);
                    }
                }, 100);
                
                artPlayer.on('video:volumechange', () => {
                    console.log('音量变化事件触发，当前音量:', Math.round(artPlayer.volume * 100) + '%');
                    syncVolumeUI();
                });
                
                artPlayer.on('setMuted', () => {
                    console.log('静音状态变化:', artPlayer.muted ? '已静音' : '已取消静音');
                    syncVolumeUI();
                });
                
                // 监听全屏变化，确保进度条坐标同步
                artPlayer.on('fullscreen', (isFullscreen) => {
                    console.log('全屏状态:', isFullscreen ? '已进入全屏' : '已退出全屏');
                    // 防止滚动条闪烁
                    document.documentElement.style.overflow = isFullscreen ? 'hidden' : 'auto';
                    // 强制调整播放器尺寸和进度条坐标
                    setTimeout(() => {
                        artPlayer.resize();
                    }, 50);
                    setTimeout(() => {
                        artPlayer.resize();
                    }, 150);
                });
                
                // 监听网页全屏变化
                artPlayer.on('fullscreenWeb', (isFullscreenWeb) => {
                    console.log('网页全屏状态:', isFullscreenWeb ? '已进入网页全屏' : '已退出网页全屏');
                    // 防止滚动条闪烁
                    document.documentElement.style.overflow = isFullscreenWeb ? 'hidden' : 'auto';
                    // 强制调整播放器尺寸和进度条坐标
                    setTimeout(() => {
                        artPlayer.resize();
                    }, 50);
                    setTimeout(() => {
                        artPlayer.resize();
                    }, 150);
                });

                // --- 修复设置浮框定位 ---
                const adjustSettingPosition = () => {
                    const settingBtn = artPlayer.template.$controls.querySelector('.art-control-setting');
                    const settingPanel = artPlayer.template.$setting;
                    const controls = artPlayer.template.$controls;
                    
                    if (settingBtn && settingPanel && controls) {
                        const playerRect = artPlayer.template.$player.getBoundingClientRect();
                        const btnRect = settingBtn.getBoundingClientRect();
                        const controlsRect = controls.getBoundingClientRect();
                        
                        // 计算右边距：播放器右边 - 齿轮按钮右边
                        const rightDist = playerRect.right - btnRect.right;
                        
                        // 计算底部边距：(播放器底部 - 控制栏顶部) + 5px
                        // 这样浮框底部就会比控制栏顶部高 5px
                        const bottomDist = (playerRect.bottom - controlsRect.top) + 5;
                        
                        settingPanel.style.right = `${rightDist}px`;
                        settingPanel.style.bottom = `${bottomDist}px`;
                        settingPanel.style.left = 'auto';
                        settingPanel.style.top = 'auto';
                    }
                };

                // 在调整大小时更新位置
                artPlayer.on('resize', adjustSettingPosition);
                
                // 监听设置按钮点击
                const settingBtn = artPlayer.template.$controls.querySelector('.art-control-setting');
                if (settingBtn) {
                    settingBtn.addEventListener('click', () => {
                        requestAnimationFrame(adjustSettingPosition);
                        // 再次尝试，以防动画延迟
                        setTimeout(adjustSettingPosition, 50);
                    });
                }
                
                // 初始调用
                setTimeout(adjustSettingPosition, 100);
            });
            
            artPlayer.on('error', (err) => {
                console.error('Player error:', err);
                showError(
                    '播放失败',
                    '视频加载失败，请检查网络连接或稍后重试',
                    '⚠️'
                );
            });
        }

        // function handleKicked 已移除

        // function startHeartbeat 已移除
        
        // 获取视频流并鉴权
        async function loadStream() {
            const { show_id, user_token } = getUrlParams();
            // username = user_token; // 已移除心跳/异地登录检测
            // 参数校验 - 只检查 show_id，免费节目允许无 user_token
            if (!show_id) {
                showError('参数错误', '缺少节目 ID，请从首页重新进入', '⚠️');
                return;
            }
            try {
                console.log('Requesting stream for show:', show_id);
                // 构造请求 URL - 如果没有 user_token 就不传
                const url = user_token 
                    ? `${API_BASE_URL}/get-stream?show_id=${show_id}&user_token=${user_token}`
                    : `${API_BASE_URL}/get-stream?show_id=${show_id}`;
                const response = await fetch(url);
                console.log('Response status:', response.status);
                if (response.ok) {
                    const data = await response.json();
                    console.log('Stream URL received:', data.url);
                    // 直接初始化播放器，无需心跳/sessionId
                    initPlayer(data.url, show_id);
                } else {
                    // 根据不同的错误码显示不同的错误信息
                    let errorTitle = '加载失败';
                    let errorMessage = '未知错误';
                    let errorIcon = '❌';
                    switch (response.status) {
                        case 403:
                            errorTitle = '权限不足';
                            errorMessage = '您尚未购买此节目，或您的访问令牌已过期';
                            errorIcon = '🔒';
                            break;
                        case 404:
                            errorTitle = '视频未找到';
                            errorMessage = '该视频暂未上线或已下架，请稍后重试';
                            errorIcon = '🔍';
                            break;
                        case 400:
                            errorTitle = '参数错误';
                            errorMessage = '请求参数有误，请返回首页重新进入';
                            errorIcon = '⚠️';
                            break;
                        case 500:
                        case 502:
                        case 503:
                            errorTitle = '服务器错误';
                            errorMessage = '服务器暂时无法响应，请稍后重试';
                            errorIcon = '🔧';
                            break;
                        default:
                            errorTitle = '加载失败';
                            errorMessage = `请求失败，错误码: ${response.status}`;
                            errorIcon = '❌';
                    }
                    showError(errorTitle, errorMessage, errorIcon);
                }
            } catch (error) {
                console.error('Network error:', error);
                showError('网络错误', '无法连接到服务器，请检查您的网络连接', '🌐');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadStream();
        });
        
        // 监听窗口大小变化，同步播放器尺寸
        window.addEventListener('resize', () => {
            if (artPlayer) {
                // 多次调用 resize 以确保进度条坐标完全同步
                artPlayer.resize();
                setTimeout(() => {
                    artPlayer.resize();
                }, 100);
            }
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (!artPlayer) return;
            
            // 防止默认滚动行为
            const preventScrollKeys = ['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
            if (preventScrollKeys.includes(e.code)) {
                e.preventDefault();
            }
            
            // 空格键：切换播放/暂停
            if (e.code === 'Space') {
                artPlayer.toggle();
            } 
            // M键：切换静音
            else if (e.code === 'KeyM') {
                e.preventDefault();
                artPlayer.muted = !artPlayer.muted;
                syncVolumeUI();
                console.log('静音状态:', artPlayer.muted ? '已静音' : '已取消静音');
            } 
            // 左箭头：后退5秒
            else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                const newTime = Math.max(0, artPlayer.currentTime - 5);
                artPlayer.seek = newTime;
                console.log('后退5秒至:', Math.floor(newTime) + 's');
            } 
            // 右箭头：前进5秒
            else if (e.code === 'ArrowRight') {
                e.preventDefault();
                const newTime = Math.min(artPlayer.duration, artPlayer.currentTime + 5);
                artPlayer.seek = newTime;
                console.log('前进5秒至:', Math.floor(newTime) + 's');
            } 
            // 上箭头：增加音量10%
            else if (e.code === 'ArrowUp') {
                adjustVolume(VOLUME_STEP);
                console.log('音量:', Math.round(artPlayer.volume * 100) + '%');
            } 
            // 下箭头：减少音量10%
            else if (e.code === 'ArrowDown') {
                adjustVolume(-VOLUME_STEP);
                console.log('音量:', Math.round(artPlayer.volume * 100) + '%');
            } 
            // F键：切换全屏
            else if (e.code === 'KeyF') {
                e.preventDefault();
                artPlayer.fullscreen = !artPlayer.fullscreen;
                console.log('F键全屏切换:', artPlayer.fullscreen ? '进入全屏' : '退出全屏');
            } 
            // Enter键（主键盘和数字键盘）：切换全屏
            else if (e.code === 'Enter' || e.code === 'NumpadEnter') {
                e.preventDefault();
                artPlayer.fullscreen = !artPlayer.fullscreen;
                console.log('Enter键全屏切换:', artPlayer.fullscreen ? '进入全屏' : '退出全屏');
            }
            // Escape键：退出全屏
            else if (e.code === 'Escape' && artPlayer.fullscreen) {
                e.preventDefault();
                artPlayer.fullscreen = false;
                console.log('Escape键退出全屏');
            }
        }, { passive: false });
        
        // 页面关闭前清理
        window.addEventListener('beforeunload', () => {
            if (artPlayer) {
                artPlayer.destroy();
            }
        });
    </script>
</body>
</html>
