<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeoFantasy Live · 管理控制台</title>
  <meta name="theme-color" content="#c3dfe0">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/assets/neofantasy-theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nf: {
              blue:  '#c3dfe0', // Light Blue
              green: '#bcd979', // Willow Green
              olive: '#9dad6f', // Muted Olive
              grey:  '#7d6d61', // Dim Grey
              brown: '#5e574d', // Stone Brown
              mist:  '#eef5f5', // 浅色页面背景（Light Blue 衍生）
              frost: '#ddecec', // 浅色次级表面
              leaf:  '#a9c961', // Willow Green 加深（hover）
              coal:  '#38342e', // 主文本
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/assets/neofantasy-theme.css">
</head>
<body class="admin-page">
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <main id="main-content" class="admin-shell">
    <div class="admin-topbar">
      <a href="/index/" class="brand-lockup" aria-label="NeoFantasy Live 首页">
        <img src="/favicon/favicon.svg" alt="" class="brand-logo" width="42" height="42">
        <span class="brand-copy"><strong>NeoFantasy</strong><small>CONTROL ROOM</small></span>
      </a>
      <button type="button" class="nf-theme-toggle" data-theme-toggle aria-label="切换主题">
        <span data-theme-icon="moon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg></span>
      </button>
    </div>

    <div class="admin-header">
      <div>
        <p class="admin-kicker">Access operations</p>
        <h1 class="admin-title">权限申请控制台</h1>
        <p id="identity" class="admin-subtitle">正在验证管理员身份…</p>
      </div>
      <div class="flex gap-2">
        <button id="refresh" type="button" class="nf-button nf-button-primary px-4 py-2 text-sm">刷新数据</button>
        <a href="/index/" class="nf-button nf-button-secondary px-4 py-2 text-sm">返回站点</a>
      </div>
    </div>

    <section id="notice" class="admin-notice mb-4 hidden border p-4 text-sm"></section>
    <section class="admin-card">
      <div class="admin-toolbar">
        <div>
          <h2 class="font-bold text-nf-brown">观看权限申请</h2>
          <p class="mt-1 text-xs text-nf-grey">审核用户提交的节目访问请求</p>
        </div>
        <label for="status-filter" class="sr-only">申请状态</label>
        <select id="status-filter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
          <option value="pending">待审核</option>
          <option value="approved">已通过</option>
          <option value="rejected">已拒绝</option>
          <option value="">全部</option>
        </select>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
          <caption class="sr-only">节目观看权限申请列表</caption>
          <thead class="text-xs uppercase">
            <tr><th class="px-4 py-3">用户</th><th class="px-4 py-3">节目</th><th class="px-4 py-3">理由</th><th class="px-4 py-3">状态</th><th class="px-4 py-3">时间</th><th class="px-4 py-3">操作</th></tr>
          </thead>
          <tbody id="requests" class="divide-y"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden p-10 text-center text-sm text-nf-grey">当前筛选条件下暂无申请</div>
    </section>
  </main>
<script>
  const API = 'https://api.neofantasy.online';
  const AUTH = 'https://auth.neofantasy.online';
  const TOKEN_KEY = 'nf_access_token';
  const token = () => localStorage.getItem(TOKEN_KEY) || '';
  const headers = () => {
    const value = { 'Content-Type': 'application/json' };
    if (token()) value.Authorization = `Bearer ${token()}`;
    return value;
  };
  const request = (path, options = {}) => fetch(`${API}${path}`, { ...options, headers: { ...headers(), ...(options.headers || {}) }, credentials: 'include' });
  const notice = (message, error = false) => {
    const el = document.getElementById('notice');
    el.textContent = message;
    el.className = `admin-notice mb-4 border p-4 text-sm ${error ? 'border-nf-grey bg-nf-brown/10 text-nf-brown' : 'border-nf-olive bg-nf-green/20 text-nf-brown'}`;
    el.classList.remove('hidden');
  };
  const escapeHtml = (value) => String(value ?? '').replace(/[&<>'"]/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char]));
  const statusText = { pending: '待审核', approved: '已通过', rejected: '已拒绝' };
  const dateTimeFormatter = new Intl.DateTimeFormat('zh-CN', { dateStyle: 'medium', timeStyle: 'short' });

  async function verifyAdmin() {
    const response = await fetch(`${AUTH}/api/session/me`, { headers: headers(), credentials: 'include' });
    const data = await response.json();
    if (!response.ok || data.user?.role !== 'admin') throw new Error('当前账号不是管理员');
    document.getElementById('identity').textContent = `已登录：${data.user.email} · 管理员`;
  }

  async function loadRequests() {
    const filter = document.getElementById('status-filter').value;
    const suffix = filter ? `?status=${encodeURIComponent(filter)}` : '';
    const response = await request(`/api/admin/permission-requests${suffix}`);
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '获取申请失败');
    const rows = data.requests || [];
    const body = document.getElementById('requests');
    document.getElementById('empty').classList.toggle('hidden', rows.length !== 0);
    body.innerHTML = rows.map((item) => `
      <tr>
        <td class="px-4 py-4 font-medium">${escapeHtml(item.user_email)}</td>
        <td class="px-4 py-4">${escapeHtml(item.show_id)}</td>
        <td class="max-w-xs px-4 py-4 text-nf-grey">${escapeHtml(item.reason || '—')}</td>
        <td class="px-4 py-4"><span class="status-pill">${statusText[item.status] || escapeHtml(item.status)}</span></td>
        <td class="whitespace-nowrap px-4 py-4 text-nf-grey">${escapeHtml(dateTimeFormatter.format(new Date(item.created_at)))}</td>
        <td class="whitespace-nowrap px-4 py-4">${item.status === 'pending' ? `<button type="button" class="nf-button nf-button-accent mr-2 px-3 py-1.5 text-xs" onclick="review('${item.id}','approved')">通过</button><button type="button" class="nf-button nf-button-danger px-3 py-1.5 text-xs" onclick="review('${item.id}','rejected')">拒绝</button>` : '—'}</td>
      </tr>`).join('');
  }

  async function review(id, status) {
    const reviewNote = prompt(status === 'approved' ? '备注（可选）' : '拒绝原因（可选）', '')
    if (reviewNote === null) return;
    const response = await request(`/api/admin/permission-requests/${encodeURIComponent(id)}/review`, { method: 'POST', body: JSON.stringify({ status, review_note: reviewNote }) });
    const data = await response.json();
    if (!response.ok) return notice(data.error || '审核失败', true);
    notice(status === 'approved' ? '已通过申请并授予节目权限。' : '已拒绝申请。');
    await loadRequests();
  }

  async function init() {
    try { await verifyAdmin(); await loadRequests(); }
    catch (error) { notice(error.message || '无法加载控制台', true); document.getElementById('requests').innerHTML = ''; }
  }
  document.getElementById('refresh').onclick = init;
  document.getElementById('status-filter').onchange = loadRequests;
  init();
</script>
</body>
</html>
